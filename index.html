<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중회화 중간고사 대비</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f6f2;--card:#fff;--border:#e0ddd4;--text:#1a1a18;--muted:#6b6b66;
  --accent:#2e5fa3;--accent-l:#e8eef8;--red:#c0392b;--red-l:#fdf0ee;
  --green:#1e7e4a;--green-l:#eaf5ee;--gold:#8a6400;--gold-l:#fdf5df;
  --zh-font:'Songti SC','STSong','SimSun',serif;--mono:'Courier New','Consolas','Menlo',monospace;
}
body{font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.header-title{font-size:16px;font-weight:700;color:var(--text)}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px}
.hud{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.hud-item{text-align:center}
.hud-n{font-size:20px;font-weight:700;color:var(--accent)}
.hud-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;width:160px}
.prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}

/* ── SCREENS ── */
.screen{display:none;max-width:800px;margin:0 auto;padding:24px 20px}
.screen.active{display:block}

/* ── START SCREEN ── */
.start-hero{text-align:center;padding:40px 0 24px}
.start-hero h1{font-size:26px;font-weight:700;margin-bottom:8px}
.start-hero p{color:var(--muted);font-size:14px;line-height:1.7}
.config-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:24px 0}
.config-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:20px 16px;cursor:pointer;transition:all .2s;text-align:center}
.config-card.selected{border-color:var(--accent);background:var(--accent-l)}
.config-card h3{font-size:13px;font-weight:700;margin-bottom:6px}
.config-card p{font-size:12px;color:var(--muted);line-height:1.5}
.config-card .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-bottom:8px;font-weight:700}
.badge-easy{background:#eaf5ee;color:#1e7e4a}
.badge-mid{background:#fdf5df;color:#8a6400}
.badge-hard{background:#fdf0ee;color:#c0392b}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
.type-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:14px 12px;cursor:pointer;text-align:center;transition:all .2s;font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic',sans-serif}
.type-btn.selected{border-color:var(--accent);background:var(--accent-l)}
.type-btn .ti{font-size:22px;margin-bottom:6px}
.type-btn span{font-size:12px;font-weight:500;display:block}
.start-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:background .2s}
.start-btn:hover{background:#1e4a8a}
.start-btn:disabled{background:#bbb;cursor:default}
.section-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}

/* ── QUESTION SCREEN ── */
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.q-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.qb-write{background:#e8eef8;color:#2e5fa3}
.qb-blank{background:#fdf5df;color:#8a6400}
.qb-pinyin{background:#eaf5ee;color:#1e7e4a}
.qb-order{background:#f0eaff;color:#6b35c8}

/* 단어 카드 */
.word-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:44px}
.answer-zone{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;padding:10px 12px;
  background:var(--bg);border:2px dashed var(--border);border-radius:10px;
  margin-bottom:12px;align-items:center;transition:border-color .2s}
.answer-zone.drag-over{border-color:var(--accent)}
.word-chip{padding:8px 14px;background:var(--card);border:1.5px solid var(--border);
  border-radius:8px;font-family:'Songti SC','STSong','SimSun',serif;font-size:17px;
  cursor:pointer;transition:all .18s;user-select:none}
.word-chip:hover{border-color:var(--accent);background:var(--accent-l);transform:translateY(-2px)}
.word-chip.placed{background:var(--accent-l);border-color:var(--accent);color:var(--accent)}
.word-chip.placed:hover{background:#fde8e8;border-color:var(--red);color:var(--red)}
.word-chip.correct{background:var(--green-l);border-color:var(--green);color:var(--green);cursor:default}
.word-chip.wrong{background:var(--red-l);border-color:var(--red);color:var(--red);cursor:default}
.order-label{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.3px}
.q-num{font-size:12px;color:var(--muted)}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:18px}
.q-lesson{font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:.3px}
.q-zh{font-family:var(--zh-font);font-size:24px;line-height:1.6;margin-bottom:8px;color:var(--text)}
.q-ko{font-size:14px;color:var(--muted);line-height:1.7}
.q-blank-sentence{font-family:var(--zh-font);font-size:20px;line-height:1.8;margin-bottom:12px}
.blank-slot{display:inline-block;border-bottom:2px solid var(--accent);min-width:80px;text-align:center;color:var(--accent);font-weight:700;margin:0 4px;padding:0 6px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.choice-btn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:12px 16px;font-family:var(--zh-font);font-size:16px;cursor:pointer;text-align:left;transition:all .18s;font-weight:400}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-l)}
.choice-btn.correct{background:var(--green-l);border-color:var(--green);color:var(--green)}
.choice-btn.wrong{background:var(--red-l);border-color:var(--red);color:var(--red)}
.choice-btn:disabled{cursor:default}
.q-hint{font-size:12px;color:var(--muted);margin-bottom:8px}

/* typing input */
.typing-wrap{margin-top:4px}
.typing-tip{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.6;padding:8px 12px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.typing-tip b{color:var(--accent)}
.type-input{width:100%;padding:12px 14px;font-family:var(--mono);font-size:14px;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);outline:none;transition:border-color .2s;letter-spacing:.2px}
.type-input:focus{border-color:var(--accent)}
.type-input.ok{border-color:var(--green);background:var(--green-l)}
.type-input.ng{border-color:var(--red);background:var(--red-l);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.wordcount{font-size:11px;color:var(--muted);margin-top:5px;height:14px}
.diff-line{font-family:var(--mono);font-size:12px;margin-top:6px;padding:6px 10px;background:var(--bg);border-radius:6px;line-height:1.8}
.diff-ok{color:var(--green)}
.diff-ng{color:var(--red);text-decoration:underline wavy var(--red)}
.diff-mis{color:var(--muted);text-decoration:underline}

/* feedback */
.fb{padding:12px 16px;border-radius:10px;font-size:14px;margin-top:12px;display:none;line-height:1.7}
.fb.show{display:block}
.fb.ok{background:var(--green-l);border:1px solid #a8d5b8;color:var(--green)}
.fb.ng{background:var(--red-l);border:1px solid #f0b8b4;color:var(--red)}
.fb .ans{font-family:var(--zh-font);font-size:16px;margin-top:4px;color:var(--text)}
.fb .pinyin-ans{font-family:var(--mono);font-size:13px;margin-top:4px;color:var(--accent)}

/* action row */
.action-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:8px;font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:#1e4a8a}
.btn-g{background:var(--card);border:1.5px solid var(--border);color:var(--muted)}
.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-ok{background:var(--green);color:#fff}
.btn-ok:hover{background:#155e36}
.btn-sm{padding:7px 14px;font-size:12px}

/* ── RESULT SCREEN ── */
.result-hero{text-align:center;padding:32px 0 20px}
.result-score{font-size:56px;font-weight:700;color:var(--accent);line-height:1}
.result-label{font-size:14px;color:var(--muted);margin-top:6px}
.result-grade{font-size:18px;font-weight:700;margin-top:10px}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.rs-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.rs-n{font-size:24px;font-weight:700}
.rs-l{font-size:11px;color:var(--muted);margin-top:3px}
.wrong-section{margin-top:24px}
.wrong-title{font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.wrong-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
.wrong-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:8px}
.wrong-q{font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.6}
.wrong-my{font-size:13px;color:var(--red);margin-bottom:4px}
.wrong-ans-zh{font-family:var(--zh-font);font-size:18px;color:var(--text);margin-bottom:2px}
.wrong-ans-py{font-family:var(--mono);font-size:12px;color:var(--accent)}
.retry-row{display:flex;gap:10px;margin-top:20px;justify-content:center;flex-wrap:wrap}

/* ── 풀었던 문장 추적 ── */
const DONE_KEY='zhonghua_done_sents'; // 풀어본 문장 zh 목록 저장
const WRONG_KEY='zhonghua_wrong_sents'; // 틀린 문장 zh 목록 저장

function getDoneSents(){
  try{ return new Set(JSON.parse(localStorage.getItem(DONE_KEY)||'[]')); }catch(e){ return new Set(); }
}
function getWrongSents(){
  try{ return new Set(JSON.parse(localStorage.getItem(WRONG_KEY)||'[]')); }catch(e){ return new Set(); }
}
function saveDoneSent(zh){
  try{
    const s=getDoneSents(); s.add(zh);
    localStorage.setItem(DONE_KEY,JSON.stringify([...s]));
  }catch(e){}
}
function saveWrongSent(zh){
  try{
    const s=getWrongSents(); s.add(zh);
    localStorage.setItem(WRONG_KEY,JSON.stringify([...s]));
  }catch(e){}
}
function removeDoneSent(zh){ // 틀리면 done에서 제거
  try{
    const s=getDoneSents(); s.delete(zh);
    localStorage.setItem(DONE_KEY,JSON.stringify([...s]));
  }catch(e){}
}

/* ── 범위 선택 ── */
function selectRange(range, el){
  cfg.range=range;
  document.querySelectorAll('#rangeAll,#rangeNew,#rangeWrong').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');

  const done=getDoneSents();
  const wrong=getWrongSents();
  const info=document.getElementById('rangeInfo');
  if(range==='all'){
    info.textContent='';
  } else if(range==='new'){
    info.textContent=`📊 지금까지 풀어본 문장: ${done.size}개 · 안 해본 문장: ${ALL.length+BLANKS.length-done.size}개 이상`;
  } else {
    info.textContent=`📊 틀린 문장: ${wrong.size}개`;
  }
}

/* ── 단원 선택 ── */
.lesson-chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.lchip{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);
  background:none;color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;transition:all .18s}
.lchip:hover{border-color:var(--accent);color:var(--accent)}
.lchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.lchip.all-on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── 기록 탭 ── */
.tab-row{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:20px}
.tab-btn{padding:10px 20px;border:none;background:none;font-family:'Noto Sans KR',sans-serif;
  font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;
  border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all .2s}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ── 기록 화면 ── */
.record-screen{display:none;max-width:800px;margin:0 auto;padding:24px 20px}
.record-screen.active{display:block}
.rec-empty{text-align:center;padding:60px 0;color:var(--muted)}
.rec-empty .rei{font-size:48px;margin-bottom:12px}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:16px}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.rec-date{font-size:11px;color:var(--muted);margin-bottom:8px}
.rec-score{font-size:28px;font-weight:700;color:var(--accent)}
.rec-total{font-size:12px;color:var(--muted)}
.rec-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.rec-tag{font-size:10px;padding:2px 8px;border-radius:20px;
  background:var(--accent-l);color:var(--accent);font-weight:700}
.rec-pct{font-size:13px;font-weight:700;margin-top:6px}
.rec-clear{background:none;border:1.5px solid var(--border);border-radius:8px;
  padding:8px 16px;font-family:'Noto Sans KR',sans-serif;font-size:12px;
  color:var(--muted);cursor:pointer;margin-top:16px}
.rec-clear:hover{border-color:var(--red);color:var(--red)}
.rec-best{display:flex;gap:12px;margin-bottom:16px}
.rb-item{flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px;text-align:center}
.rb-n{font-size:22px;font-weight:700;color:var(--gold)}
.rb-l{font-size:10px;color:var(--muted);margin-top:2px}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

@media(max-width:600px){
  .config-grid{grid-template-columns:1fr}
  .type-grid{grid-template-columns:1fr}
  .choices{grid-template-columns:1fr}
  .result-stats{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="mainHeader">
  <div>
    <div class="header-title">중회화 중간고사 대비</div>
    <div class="header-sub" id="headerSub">1과 ~ 7과 전체 범위</div>
  </div>
  <div class="tab-row" id="mainTabs">
    <button class="tab-btn on" onclick="switchTab('exam',this)">📝 시험</button>
    <button class="tab-btn" onclick="switchTab('record',this)">📊 나의 기록</button>
  </div>
  <div class="hud" id="hudArea" style="display:none">
    <button onclick="confirmBack()" style="padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:none;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">← 처음으로</button>
    <div class="hud-item"><div class="hud-n" id="hudQ">0/0</div><div class="hud-l">문제</div></div>
    <div class="hud-item"><div class="hud-n" id="hudScore">0</div><div class="hud-l">점수</div></div>
    <div class="hud-item">
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="hud-l" style="margin-top:4px">진행률</div>
    </div>
  </div>
</div>

<!-- START SCREEN -->
<div class="screen active" id="startScreen">
  <div class="start-hero">
    <h1>중간고사 대비 시험</h1>
    <p>1과~7과 전체 문장 수록 · 세 가지 유형 · 난이도 선택<br>틀린 문제는 마지막에 모아서 복습할 수 있어요</p>
  </div>

  <div class="section-label">유형 선택 (복수 선택 가능)</div>
  <div class="type-grid">
    <button class="type-btn selected" data-type="write" onclick="toggleType('write',this)">
      <div class="ti">✍️</div>
      <span>유형 1</span>
      <span style="color:var(--muted);font-size:11px">한글 뜻 보고 중국어 쓰기</span>
    </button>
    <button class="type-btn selected" data-type="blank" onclick="toggleType('blank',this)">
      <div class="ti">📝</div>
      <span>유형 2</span>
      <span style="color:var(--muted);font-size:11px">문맥에 맞는 단어 빈칸 넣기</span>
    </button>
    <button class="type-btn selected" data-type="pinyin" onclick="toggleType('pinyin',this)">
      <div class="ti">🔤</div>
      <span>유형 3</span>
      <span style="color:var(--muted);font-size:11px">중국어 듣고 병음 쓰기</span>
    </button>
    <button class="type-btn selected" data-type="order" onclick="toggleType('order',this)">
      <div class="ti">🧩</div>
      <span>유형 4</span>
      <span style="color:var(--muted);font-size:11px">단어 순서 배열하기</span>
    </button>
  </div>

  <div class="section-label" style="margin-top:20px">난이도 선택</div>
  <div class="config-grid">
    <div class="config-card selected" data-level="easy" onclick="selectLevel('easy',this)">
      <div class="badge badge-easy">하</div>
      <h3>초급</h3>
      <p>짧은 문장 위주<br>기본 어휘 · 힌트 있음</p>
    </div>
    <div class="config-card" data-level="mid" onclick="selectLevel('mid',this)">
      <div class="badge badge-mid">중</div>
      <h3>중급</h3>
      <p>중간 길이 문장<br>힌트 없음</p>
    </div>
    <div class="config-card" data-level="hard" onclick="selectLevel('hard',this)">
      <div class="badge badge-hard">상</div>
      <h3>고급</h3>
      <p>긴 문장 · 복잡한 구조<br>병음 대소문자 · 띄어쓰기 엄격</p>
    </div>
  </div>

  <div class="section-label" style="margin-top:20px">단원 선택 (복수 선택 가능)</div>
  <div class="lesson-chips" id="lessonChips">
    <button class="lchip all-on" data-lesson="all" onclick="toggleLesson('all',this)">전체</button>
    <button class="lchip on" data-lesson="1과" onclick="toggleLesson('1과',this)">1과</button>
    <button class="lchip on" data-lesson="2과" onclick="toggleLesson('2과',this)">2과</button>
    <button class="lchip on" data-lesson="3과" onclick="toggleLesson('3과',this)">3과</button>
    <button class="lchip on" data-lesson="4과" onclick="toggleLesson('4과',this)">4과</button>
    <button class="lchip on" data-lesson="5과" onclick="toggleLesson('5과',this)">5과</button>
    <button class="lchip on" data-lesson="6과" onclick="toggleLesson('6과',this)">6과</button>
    <button class="lchip on" data-lesson="7과" onclick="toggleLesson('7과',this)">7과</button>
    <button class="lchip on" data-lesson="부록" onclick="toggleLesson('부록',this)">부록</button>
  </div>

  <div class="section-label" style="margin-top:20px">문제 수</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">

{zh:"快要下班的时候，老板让我复印几份东西，我用最快的速度复印完了。",ko:"퇴근하려는데 사장님이 서류 몇 장을 복사하라고 해서 최대한 빠른 속도로 복사를 끝냈어요.",pinyin:"Kuàiyào xiàbān de shíhou, lǎobǎn ràng wǒ fùyìn jǐ fèn dōngxi, wǒ yòng zuì kuài de sùdù fùyìn wán le.",lesson:"5과",level:3},
{zh:"出来时，发现自行车没气了。",ko:"밖에 나와 보니 자전거 타이어 바람이 빠져 있었어요.",pinyin:"Chūlái shí, fāxiàn zìxíngchē méi qì le.",lesson:"5과",level:2},
{zh:"你总是有那么多理由。",ko:"당신은 왜 이렇게 매번 핑계가 많아요.",pinyin:"Nǐ zǒngshì yǒu nàme duō lǐyóu.",lesson:"5과",level:1,words:["你", "总是", "有", "那么多", "理由"]},
{zh:"好了，别生气了，原谅我吧。",ko:"알았어요, 이제 화 풀어요, 제발 용서해줘요.",pinyin:"Hǎo le, bié shēngqì le, yuánliàng wǒ ba.",lesson:"5과",level:1,words:["好了", "别", "生气了", "原谅", "我", "吧"]},
{zh:"每次约会你都迟到，下回谁还相信你呀？",ko:"매번 데이트마다 늦으면서, 다음에 누가 당신을 믿겠어요?",pinyin:"Měi cì yuēhuì nǐ dōu chídào, xià huí shéi hái xiāngxìn nǐ ya?",lesson:"5과",level:2},
{zh:"你以为我有的是时间等你呀？",ko:"내가 당신을 기다릴 시간이 넘쳐나는 줄 알아요?",pinyin:"Nǐ yǐwéi wǒ yǒude shì shíjiān děng nǐ ya?",lesson:"5과",level:2,words:["你", "以为", "我", "有的是", "时间", "等你", "呀"]},
{zh:"睡不着。愿意陪我聊聊吗？",ko:"잠이 안 와요. 저랑 좀 얘기해줄 수 있어요?",pinyin:"Shuì bu zháo. Yuànyì péi wǒ liáoliao ma?",lesson:"5과",level:1,words:["睡不着", "愿意", "陪", "我", "聊聊", "吗"]},
{zh:"当然。我猜你一定有心事了。",ko:"물론이죠. 분명 무슨 마음의 짐이 있는 것 같은데요.",pinyin:"Dāngrán. Wǒ cāi nǐ yīdìng yǒu xīnshì le.",lesson:"5과",level:1,words:["当然", "我", "猜", "你", "一定", "有", "心事了"]},
{zh:"我们俩不是一个国家的人，文化背景，生活习惯都不一样，我妈妈一定不同意我的选择。",ko:"우리 둘은 같은 나라 사람도 아니고, 문화적 배경이나 생활 습관도 전혀 달라서, 엄마가 제 선택을 절대 받아들이지 않으실 거예요.",pinyin:"Wǒmen liǎ bú shì yī ge guójiā de rén, wénhuà bèijǐng, shēnghuó xíguàn dōu bù yīyàng, wǒ māma yīdìng bù tóngyì wǒ de xuǎnzé.",lesson:"5과",level:3,words:["我们俩", "不是", "一个", "国家的人", "文化背景", "生活习惯", "都", "不一样", "我妈妈", "一定", "不同意", "我的选择"]},
{zh:"重要的是你们俩真心相爱。",ko:"중요한 것은 두 사람이 진심으로 사랑하는 거예요.",pinyin:"Zhòngyào de shì nǐmen liǎ zhēnxīn xiāng'ài.",lesson:"5과",level:2,words:["重要的是", "你们俩", "真心", "相爱"]},
{zh:"正因为是妈妈，她才更希望你快乐幸福。",ko:"엄마이기 때문에 오히려 더 당신이 행복하고 즐겁게 살기를 바라는 거예요.",pinyin:"Zhèng yīnwéi shì māma, tā cái gèng xīwàng nǐ kuàilè xìngfú.",lesson:"5과",level:3,words:["正因为", "是", "妈妈", "她", "才", "更", "希望", "你", "快乐", "幸福"]},
{zh:"今年暑假我一定带他去见见我妈。",ko:"올 여름방학에는 꼭 그를 데리고 가서 엄마께 인사시킬 거예요.",pinyin:"Jīnnián shǔjià wǒ yīdìng dài tā qù jiànjiàn wǒ mā.",lesson:"5과",level:2,words:["今年暑假", "我", "一定", "带", "他", "去", "见见", "我妈"]},
// ── 6과 ──
{zh:"我发现中国的老人挺爱跳舞的。",ko:"중국 노인들이 춤추는 걸 꽤 좋아한다는 걸 알게 됐어요.",pinyin:"Wǒ fāxiàn Zhōngguó de lǎorén tǐng ài tiàowǔ de.",lesson:"6과",level:1,words:["我", "发现", "中国的", "老人", "挺", "爱", "跳舞的"]},
{zh:"每天不论早上还是傍晚，在公园里，总能看见跳舞的老人。",ko:"매일 아침이든 저녁이든 상관없이 공원에서 춤추는 노인들을 늘 볼 수 있어요.",pinyin:"Měitiān bùlùn zǎoshang háishi bàngwǎn, zài gōngyuán lǐ, zǒng néng kànjiàn tiàowǔ de lǎorén.",lesson:"6과",level:3},
{zh:"爱动不爱动都不重要，重要的是心不能老，心一老比什么都可怕。",ko:"활동적이든 아니든 다 상관없어요, 중요한 건 마음만은 늙어선 안 된다는 거예요, 마음이 늙으면 그 무엇보다 무섭거든요.",pinyin:"Ài dòng bú ài dòng dōu bú zhòngyào, zhòngyào de shì xīn bù néng lǎo, xīn yì lǎo bǐ shénme dōu kěpà.",lesson:"6과",level:3},
{zh:"有的老人不愿意去，他们觉得在哪儿也不如在家好。",ko:"어떤 노인들은 가기 싫어해요, 어디를 가도 집보다 좋은 곳은 없다고 생각하거든요.",pinyin:"Yǒude lǎorén bú yuànyì qù, tāmen juéde zài nǎr yě bùrú zài jiā hǎo.",lesson:"6과",level:2},
{zh:"他们的儿女怎么不多为父母想想，他们不希望父母幸福吗？",ko:"자녀들이 왜 부모 입장에서 좀 더 생각해 주지 않는 건가요, 부모가 행복하길 바라지 않는 건가요?",pinyin:"Tāmen de érnǚ zěnme bù duō wèi fùmǔ xiǎngxiang, tāmen bù xīwàng fùmǔ xìngfú ma?",lesson:"6과",level:3},
{zh:"老人也有再婚的自由，您别怕这怕那的。",ko:"노인도 재혼할 자유가 있어요, 이것저것 겁내지 마세요.",pinyin:"Lǎorén yě yǒu zàihūn de zìyóu, nín bié pà zhè pà nà de.",lesson:"6과",level:2,words:["老人", "也有", "再婚的", "自由", "您", "别怕", "这怕那的"]},
{zh:"您自己感觉幸福就够了，不要管别人怎么看。",ko:"스스로 행복하다고 느끼면 그걸로 충분해요, 남들이 어떻게 생각하는지는 신경 쓰지 마세요.",pinyin:"Nín zìjǐ gǎnjué xìngfú jiù gòu le, bú yào guǎn biérén zěnme kàn.",lesson:"6과",level:2,words:["您", "自己", "感觉", "幸福", "就够了", "不要", "管", "别人", "怎么看"]},
{zh:"我真心希望您过得幸福，快乐！",ko:"진심으로 어머니께서 행복하고 기쁘게 지내시기를 바라요!",pinyin:"Wǒ zhēnxīn xīwàng nín guò de xìngfú, kuàilè!",lesson:"6과",level:1,words:["我", "真心", "希望", "您", "过得", "幸福", "快乐"]},
{zh:"可是儿子的爱代替不了丈夫的爱呀。",ko:"하지만 아들의 사랑이 남편의 사랑을 대신할 수는 없잖아요.",pinyin:"Kěshì ér de ài dàitì bu liǎo zhàngfu de ài ya.",lesson:"6과",level:2},
// ── 7과 ──
{zh:"周末怎么过？",ko:"주말에 어떻게 보내세요?",pinyin:"Zhōumò zěnme guò?",lesson:"7과",level:1,words:["周末", "怎么", "过"]},
{zh:"大家在一起热闹。做做饭，看看电视，收拾收拾房间，饭桌上一起聊聊天儿。",ko:"다 같이 있으면 왁자지껄 즐거워요. 밥도 같이 짓고, TV도 보고, 방도 치우고, 밥상에 둘러앉아 도란도란 얘기도 나눠요.",pinyin:"Dàjiā zài yīqǐ rènao. Zuòzuo fàn, kànkan diànshì, shōushi shōushi fángjiān, fànzhuō shàng yīqǐ liáoliao tiānr.",lesson:"7과",level:3},
{zh:"我爸我妈不爱活动，还说出去玩儿是乱花钱，他们看不惯。",ko:"우리 부모님은 활동하는 걸 좋아하지 않으시고, 나가서 노는 건 돈 낭비라며 탐탁지 않아 하세요.",pinyin:"Wǒ bà wǒ mā bú ài huódòng, hái shuō chūqu wánr shì luàn huā qián, tāmen kàn bu guàn.",lesson:"7과",level:3},
{zh:"有时候花点儿钱出去玩儿玩儿，快乐地过个周末也是值得的。",ko:"가끔은 돈을 조금 써서 나가 즐기면서 주말을 행복하게 보내는 것도 충분히 가치 있는 일이에요.",pinyin:"Yǒushíhou huā diǎnr qián chūqu wánr wánr, kuàilè de guò ge zhōumò yě shì zhíde de.",lesson:"7과",level:3,words:["有时候", "花点儿钱", "出去", "玩儿玩儿", "快乐地", "过个", "周末", "也是", "值得的"]},
{zh:"老年人和年轻人的想法太不一样了，这就是他们之间的代沟吧？",ko:"노인과 젊은이의 생각이 이렇게나 다르다니, 이게 바로 세대 차이라는 거겠죠?",pinyin:"Lǎoniánrén hé niánqīngrén de xiǎngfa tài bù yīyàng le, zhè jiù shì tāmen zhījiān de dàigōu ba?",lesson:"7과",level:3,words:["老年人", "和", "年轻人的", "想法", "太不一样了", "这", "就是", "他们之间的", "代沟吧"]},
{zh:"在家里，我爱听我爸爸讲他过去的经历。",ko:"집에서는 아버지가 들려주시는 옛날 경험담을 듣는 게 좋아요.",pinyin:"Zài jiā lǐ, wǒ ài tīng wǒ bàba jiǎng tā guòqù de jīnglì.",lesson:"7과",level:2,words:["在家里", "我", "爱听", "我爸爸", "讲", "他", "过去的", "经历"]},
{zh:"妈，您又在洗衣服？我来吧。",ko:"엄마, 또 빨래하세요? 제가 할게요.",pinyin:"Mā, nín yòu zài xǐ yīfu? Wǒ lái ba.",lesson:"7과",level:1,words:["妈", "您", "又在", "洗衣服", "我来吧"]},
{zh:"几件衣服，用洗衣机又费电，又费水。",ko:"옷이 몇 벌밖에 안 되는데 세탁기를 돌리면 전기도 아깝고 물도 아깝잖아요.",pinyin:"Jǐ jiàn yīfu, yòng xǐyījī yòu fèi diàn, yòu fèi shuǐ.",lesson:"7과",level:1,words:["几件", "衣服", "用", "洗衣机", "又", "费电", "又", "费水"]},
{zh:"那好吧，我只好听您的，但是千万别把您自己累坏了。",ko:"그렇군요, 어쩔 수 없이 어머니 말씀을 따를게요, 그래도 제발 몸이 망가지도록 무리하지는 마세요.",pinyin:"Nà hǎo ba, wǒ zhǐhǎo tīng nín de, dànshì qiānwàn bié bǎ nín zìjǐ lèi huài le.",lesson:"7과",level:2,words:["那好吧", "我", "只好", "听", "您的", "但是", "千万", "别", "把", "您自己", "累坏了"]},
{zh:"在那儿过春节比在北京热闹多了。",ko:"거기서 춘절을 지내면 베이징보다 훨씬 더 활기차고 떠들썩해요.",pinyin:"Zài nàr guò Chūnjié bǐ zài Běijīng rènao duō le.",lesson:"7과",level:2,words:["在那儿", "过", "春节", "比", "在北京", "热闹", "多了"]},
{zh:"回到小时候生活过的地方，也是我出生的地方，我感到特别亲切。",ko:"어린 시절을 보냈던 곳, 제가 태어난 바로 그곳으로 돌아오니 각별히 정겹고 포근한 느낌이 들었어요.",pinyin:"Huídào xiǎoshíhou shēnghuó guò de dìfang, yě shì wǒ chūshēng de dìfang, wǒ gǎndào tèbié qīnqiè.",lesson:"부록",level:3,words:["回到", "小时候", "生活过的", "地方", "也是", "我", "出生的", "地方", "我", "感到", "特别", "亲切"]},
{zh:"这位先生，请您把车放在存车处，您看，牌子上写着\"这里不准放车\"。",ko:"선생님, 자전거 보관소에 자전거를 놔주세요, 보세요, 팻말에 \"여기에 자전거를 세우면 안 됩니다\"라고 써있어요.",pinyin:"Zhè wèi xiānsheng, qǐng nín bǎ chē fàng zài cúnchē chù, nín kàn, páizi shàng xiě zhe \"zhèlǐ bù zhǔn fàng chē\".",lesson:"3과",level:3},
{zh:"打辆的吧，又碰上堵车。",ko:"택시를 잡아탔더니 또 교통 체증에 걸리고 말았어요.",pinyin:"Dǎ liàng dī ba, yòu pèng shàng dǔ chē.",lesson:"5과",level:2,words:["打辆的", "吧", "又", "碰上", "堵车"]},
{zh:"一般的老人怎么过呢？有人去养老院吗？",ko:"보통 노인들은 어떻게 지내나요? 양로원에 가는 분들도 있나요?",pinyin:"Yībān de lǎorén zěnme guò ne? Yǒu rén qù yǎnglǎoyuàn ma?",lesson:"6과",level:2,words:["一般的", "老人", "怎么过呢", "有人", "去", "养老院", "吗"]},
{zh:"校门外有一家小饭馆，是不久以前新开的。",ko:"교문 밖에 작은 식당이 하나 있는데, 얼마 되지 않아 새로 생긴 곳이에요.",pinyin:"Xiào mén wài yǒu yì jiā xiǎo fànguǎn, shì bùjiǔ yǐqián xīn kāi de.",lesson:"부록",level:2},
{zh:"不但味道好得很，而且价钱十分便宜，服务也挺周到的。",ko:"맛도 정말 좋고, 가격도 매우 저렴하고, 서비스도 꽤 꼼꼼하고 친절해요.",pinyin:"Búdàn wèidao hǎo de hěn, érqiě jiàqian shífēn piányí, fúwù yě tǐng zhōudào de.",lesson:"7과",level:2,words:["不但", "味道", "好得很", "而且", "价钱", "十分", "便宜", "服务", "也", "挺", "周到的"]},
{zh:"妈妈，他虽然是外国人，但是他愿意尊重咱们的民族习惯。",ko:"엄마, 그 사람이 비록 외국인이긴 해도 우리 민족의 풍습을 기꺼이 존중해요.",pinyin:"Māma, tā suīrán shì wàiguórén, dànshì tā yuànyì zūnzhòng zánmen de mínzú xíguàn.",lesson:"부록",level:3},
{zh:"我现在身体还不错，没什么大病，我要多尝些没尝过的东西，多去些好玩的地方看看。",ko:"지금은 몸도 꽤 건강하고 큰 병도 없으니, 아직 못 먹어본 것도 더 먹어보고 재밌는 곳도 더 구경하러 다닐 거예요.",pinyin:"Wǒ xiànzài shēntǐ hái búcuò, méi shénme dà bìng, wǒ yào duō cháng xiē méi cháng guò de dōngxi, duō qù xiē hǎowán de dìfang kànkan.",lesson:"부록",level:3},

// ── 1과 추가 ──
{zh:"有几位新同学，欢迎你们！",ko:"새로운 동기들이 몇 명 있어요, 환영해요!",pinyin:"Yǒu jǐ wèi xīn tóngxué, huānyíng nǐmen!",lesson:"1과",level:1,words:["有几位", "新同学", "欢迎", "你们"]},
{zh:"老师，我们已经认识了。",ko:"선생님, 저희는 이미 알고 있어요.",pinyin:"Lǎoshī, wǒmen yǐjīng rènshi le.",lesson:"1과",level:1},
{zh:"是吗？给我介绍介绍。",ko:"그래요? 저한테 소개해 줘요.",pinyin:"Shì ma? Gěi wǒ jièshào jièshào.",lesson:"1과",level:1},
{zh:"我叫山田有美，日本人，请您多多关照。",ko:"저는 야마다 유미라고 해요, 일본인이에요, 앞으로 잘 부탁드립니다.",pinyin:"Wǒ jiào Shāntián Yǒuměi, Rìběnrén, qǐng nín duōduō guānzhào.",lesson:"1과",level:1,words:["我叫", "山田有美", "日本人", "请您", "多多", "关照"]},
{zh:"下边谁接着说？",ko:"다음은 누가 이어서 말할 건가요?",pinyin:"Xiàbiān shéi jiēzhe shuō?",lesson:"1과",level:1,words:["下边", "谁", "接着", "说"]},
{zh:"你的名字？",ko:"당신 이름은요?",pinyin:"Nǐ de míngzi?",lesson:"1과",level:1},
{zh:"咱们班怎么样？",ko:"우리 반은 어때요?",pinyin:"Zánmen bān zěnmeyàng?",lesson:"1과",level:1},
{zh:"我回来啦，安妮。",ko:"나 돌아왔어, 안니.",pinyin:"Wǒ huílái la, Ānnī.",lesson:"1과",level:1},
{zh:"玩儿得一定很开心吧？",ko:"정말 즐겁게 놀았겠죠?",pinyin:"Wánr de yīdìng hěn kāixīn ba?",lesson:"1과",level:1},
{zh:"当然啦，可有意思了。",ko:"당연하죠, 정말 재미있었어요.",pinyin:"Dāngrán la, kě yǒuyìsi le.",lesson:"1과",level:1},
{zh:"我看看，你好像比以前瘦了，也黑了，不过更精神了。",ko:"어디 보자, 예전보다 살이 좀 빠지고 피부도 탔지만, 오히려 더 활기차 보여요.",pinyin:"Wǒ kànkan, nǐ hǎoxiàng bǐ yǐqián shòu le, yě hēi le, búguò gèng jīngshén le.",lesson:"1과",level:2},
{zh:"别光说我了，你寒假过得怎么样？家里都好吧？",ko:"저 얘기만 하지 말고, 겨울방학은 어떻게 보냈어요? 집안은 다 잘 있죠?",pinyin:"Bié guāng shuō wǒ le, nǐ hánjià guò de zěnmeyàng? Jiā lǐ dōu hǎo ba?",lesson:"1과",level:2,words:["别光说我了", "你", "寒假", "过得", "怎么样", "家里", "都好", "吧"]},
{zh:"都好，谢谢。",ko:"다 잘 있어요, 고마워요.",pinyin:"Dōu hǎo, xièxie.",lesson:"1과",level:1,words:["都好", "谢谢"]},
{zh:"对了，这是我家乡的特产，是我爸爸妈妈给你的。我们还向你问好呢。",ko:"참, 이건 우리 고향 특산물이에요, 저희 부모님이 당신에게 주라고 하신 거예요. 안부도 전하래요.",pinyin:"Duìle, zhè shì wǒ jiāxiāng de tèchǎn, shì wǒ bàba māma gěi nǐ de. Wǒmen hái xiàng nǐ wènhǎo ne.",lesson:"1과",level:2},
{zh:"你父母真好！",ko:"부모님이 정말 좋은 분들이네요!",pinyin:"Nǐ fùmǔ zhēn hǎo!",lesson:"1과",level:1,words:["你", "父母", "真好"]},
{zh:"对了，昨天我碰见杰夫了。他说，你回来以后，大家聚聚。",ko:"참, 어제 제프를 우연히 만났어요. 그는 당신이 돌아오면 다들 모이자고 했어요.",pinyin:"Duìle, zuótiān wǒ pèngjiàn Jiéfū le. Tā shuō, nǐ huílái yǐhòu, dàjiā jùjù.",lesson:"1과",level:2},
{zh:"杰夫，好久不见了。你寒假回国了，还是旅行去了？",ko:"제프, 오랜만이에요. 겨울방학에 귀국했어요, 아니면 여행 갔어요?",pinyin:"Jiéfū, hǎojiǔ bú jiàn le. Nǐ hánjià huíguó le, háishi lǚxíng qù le?",lesson:"1과",level:2},
{zh:"都不是。我哪儿也没去。",ko:"둘 다 아니에요. 저는 아무 데도 안 갔어요.",pinyin:"Dōu bú shì. Wǒ nǎr yě méi qù.",lesson:"1과",level:1,words:["都不是", "我", "哪儿", "也", "没去"]},
{zh:"那么长的假期，哪儿也没去？",ko:"그렇게 긴 방학인데 아무 데도 안 갔어요?",pinyin:"Nàme cháng de jiàqī, nǎr yě méi qù?",lesson:"1과",level:1},
{zh:"你？当老师？",ko:"당신이요? 선생님을요?",pinyin:"Nǐ? Dāng lǎoshī?",lesson:"1과",level:1,words:["你", "当", "老师"]},
{zh:"感觉怎么样？",ko:"느낌이 어때요?",pinyin:"Gǎnjué zěnmeyàng?",lesson:"1과",level:1,words:["感觉", "怎么样"]},
{zh:"又辛苦有快乐。",ko:"힘들기도 하고 즐겁기도 해요.",pinyin:"Yòu xīnkǔ yǒu kuàilè.",lesson:"1과",level:1},
{zh:"看我，把这个忘了。",ko:"이것 봐요, 이걸 깜빡했네요.",pinyin:"Kàn wǒ, bǎ zhège wàng le.",lesson:"1과",level:1,words:["看我", "把", "这个", "忘了"]},
{zh:"走，我介绍你们认识认识。",ko:"가요, 제가 서로 소개해 드릴게요.",pinyin:"Zǒu, wǒ jièshào nǐmen rènshi rènshi.",lesson:"1과",level:1,words:["走", "我", "介绍", "你们", "认识认识"]},
// ── 2과 추가 ──
{zh:"走，看球去。",ko:"가요, 경기 보러 가요.",pinyin:"Zǒu, kàn qiú qù.",lesson:"2과",level:1,words:["走", "看球", "去"]},
{zh:"哪儿有球赛？",ko:"어디서 경기해요?",pinyin:"Nǎr yǒu qiúsài?",lesson:"2과",level:1},
{zh:"学校足球场。",ko:"학교 축구장이요.",pinyin:"Xuéxiào zúqiú chǎng.",lesson:"2과",level:1},
{zh:"谁跟谁比？",ko:"누구 대 누구 경기예요?",pinyin:"Shéi gēn shéi bǐ?",lesson:"2과",level:1,words:["谁", "跟", "谁", "比"]},
{zh:"国际队对校队。",ko:"국제팀 대 교내팀이에요.",pinyin:"Guójìduì duì xiàoduì.",lesson:"2과",level:1,words:["国际队", "对", "校队"]},
{zh:"国际队？",ko:"국제팀이요?",pinyin:"Guójìduì?",lesson:"2과",level:1},
{zh:"是啊。有外国留学生组成的队，他们踢得挺好的。",ko:"네. 외국 유학생들로 구성된 팀인데, 꽤 잘 차요.",pinyin:"Shì a. Yǒu wàiguó liúxuéshēng zǔchéng de duì, tāmen tī de tǐng hǎo de.",lesson:"2과",level:2},
{zh:"能赢校队吗？",ko:"교내팀을 이길 수 있을까요?",pinyin:"Néng yíng xiàoduì ma?",lesson:"2과",level:1},
{zh:"比赛开始了，国际队加油！",ko:"경기가 시작됐어요, 국제팀 파이팅!",pinyin:"Bǐsài kāishǐ le, guójìduì jiāyóu!",lesson:"2과",level:1,words:["比赛", "开始了", "国际队", "加油"]},
{zh:"七号摔倒了，快爬起来呀。",ko:"7번이 넘어졌어요, 빨리 일어나요.",pinyin:"Qī hào shuāi dǎo le, kuài pá qǐlái ya.",lesson:"2과",level:2},
{zh:"没事，你看他挺轻松地站起来了。",ko:"괜찮아요, 봐요 꽤 가뿐하게 일어났잖아요.",pinyin:"Méishì, nǐ kàn tā tǐng qīngsōng de zhàn qǐlái le.",lesson:"2과",level:2,words:["没事", "你看", "他", "挺", "轻松地", "站起来了"]},
{zh:"十三号怎么推人呢？",ko:"13번이 왜 사람을 밀어요?",pinyin:"Shísān hào zěnme tuī rén ne?",lesson:"2과",level:1},
{zh:"裁判给了他一张黄牌儿。",ko:"심판이 그에게 옐로카드를 줬어요.",pinyin:"Cáipàn gěi le tā yī zhāng huángpáir.",lesson:"2과",level:2,words:["裁判", "给了", "他", "一张", "黄牌儿"]},
{zh:"罚得好。好球！进了！",ko:"잘 됐어요. 슛! 들어갔어요!",pinyin:"Fá de hǎo. Hǎo qiú! Jìn le!",lesson:"2과",level:1},
{zh:"听，好像有人敲门。",ko:"들어봐요, 누가 문 두드리는 것 같아요.",pinyin:"Tīng, hǎoxiàng yǒu rén qiāo mén.",lesson:"2과",level:1},
{zh:"快去看看。",ko:"빨리 가서 봐요.",pinyin:"Kuài qù kànkan.",lesson:"2과",level:1},
{zh:"我母亲病了，需要安静。",ko:"저희 어머니가 아프셔서 조용히 해야 해요.",pinyin:"Wǒ mǔqīn bìng le, xūyào ānjìng.",lesson:"2과",level:1},
{zh:"真对不起，影响你母亲休息了。",ko:"정말 죄송해요, 어머니 쉬시는 데 방해가 됐네요.",pinyin:"Zhēn duìbuqǐ, yǐngxiǎng nǐ mǔqīn xiūxi le.",lesson:"2과",level:2},
{zh:"咱们俩一样，都是球迷。",ko:"우리 둘 다 똑같이 축구 팬이네요.",pinyin:"Zánmen liǎ yīyàng, dōu shì qiúmí.",lesson:"2과",level:1,words:["咱们俩", "一样", "都是", "球迷"]},
{zh:"现在几比几了？",ko:"지금 몇 대 몇이에요?",pinyin:"Xiànzài jǐ bǐ jǐ le?",lesson:"2과",level:1},
{zh:"我的女朋友是拉拉队的队长。",ko:"제 여자친구가 응원단 단장이에요.",pinyin:"Wǒ de nǚpéngyou shì lālāduì de duìzhǎng.",lesson:"2과",level:1},
{zh:"有了她们的热情支持，比赛的时候，我们更有精神了，今天的比赛就是这样。",ko:"그녀들의 열정적인 응원 덕분에 경기할 때 더욱 힘이 났어요, 오늘 경기가 바로 그랬어요.",pinyin:"Yǒu le tāmen de rèqíng zhīchí, bǐsài de shíhou, wǒmen gèng yǒu jīngshén le, jīntiān de bǐsài jiù shì zhèyàng.",lesson:"2과",level:3},
{zh:"开始的时候，大家很紧张，都怕输掉比赛。",ko:"처음에는 다들 너무 긴장해서 경기에서 질까봐 두려워했어요.",pinyin:"Kāishǐ de shíhou, dàjiā hěn jǐnzhāng, dōu pà shū diào bǐsài.",lesson:"2과",level:2,words:["开始的时候", "大家", "很", "紧张", "都", "怕", "输掉", "比赛"]},
{zh:"这时候，我听见了拉拉队员们的加油声'国际队一定赢！'",ko:"바로 그때 응원단원들의 '국제팀 반드시 이겨라!'라는 응원 소리가 들려왔어요.",pinyin:"Zhè shíhou, wǒ tīngjiàn le lālāduìyuánmen de jiāyóu shēng 'Guójìduì yīdìng yíng!'",lesson:"2과",level:3},
{zh:"离比赛结束还有最后一分钟的时候，我们队又踢进了一个球！",ko:"경기가 끝나기까지 마지막 1분이 남았을 때, 우리 팀이 또 한 골을 넣었어요!",pinyin:"Lí bǐsài jiéshù hái yǒu zuìhòu yī fēnzhōng de shíhou, wǒmen duì yòu tī jìn le yī ge qiú!",lesson:"2과",level:3},
{zh:"2比1，我们队赢了！",ko:"2 대 1로 우리 팀이 이겼어요!",pinyin:"Èr bǐ yī, wǒmen duì yíng le!",lesson:"2과",level:1,words:["2比1", "我们队", "赢了"]},
// ── 3과 추가 ──
{zh:"师傅，这车到动物园吗？",ko:"기사님, 이 차 동물원에 가나요?",pinyin:"Shīfu, zhè chē dào dòngwùyuán ma?",lesson:"3과",level:1,words:["师傅", "这车", "到", "动物园", "吗"]},
{zh:"下了车，到马路对面坐车。",ko:"차에서 내려서 도로 맞은편에서 타세요.",pinyin:"Xià le chē, dào mǎlù duìmiàn zuò chē.",lesson:"3과",level:2,words:["下了车", "到", "马路对面", "坐车"]},
{zh:"劳驾，麻烦你听一下儿车。",ko:"실례합니다, 죄송한데 차를 잠깐만 세워주세요.",pinyin:"Láojià, máfan nǐ tīng yīxiàr chē.",lesson:"3과",level:2},
{zh:"我做错车了，快让我下去吧！",ko:"저 반대 차를 탔어요, 빨리 내려주세요!",pinyin:"Wǒ zuò cuò chē le, kuài ràng wǒ xià qù ba!",lesson:"3과",level:2,words:["我", "做错车了", "快", "让我", "下去", "吧"]},
{zh:"怎么这么晚才回来？",ko:"왜 이렇게 늦게 돌아왔어요?",pinyin:"Zěnme zhème wǎn cái huílái?",lesson:"3과",level:1,words:["怎么", "这么晚", "才", "回来"]},
{zh:"什么？出什么事了？",ko:"뭐라고요? 무슨 일이 있었어요?",pinyin:"Shénme? Chū shénme shì le?",lesson:"3과",level:1},
{zh:"没伤着人吧？",ko:"사람은 다치지 않았죠?",pinyin:"Méi shāng zháo rén ba?",lesson:"3과",level:1},
{zh:"没有。",ko:"없어요.",pinyin:"Méiyǒu.",lesson:"3과",level:1,words:["没有"]},
{zh:"以后小心点吧。",ko:"앞으로는 조심해요.",pinyin:"Yǐhòu xiǎoxīn diǎn ba.",lesson:"3과",level:1},
{zh:"你应该好好记住：'高高兴兴上班去，平平安安回家来。'好让我们每天都放心哪。",ko:"잘 기억해 둬야 해요: '즐겁게 출근하고, 무사히 귀가한다.' 우리가 매일 안심할 수 있게요.",pinyin:"Nǐ yīnggāi hǎohǎo jìzhu: 'Gāogāo xìngxìng shàngbān qù, píngpíng ān'ān huí jiā lái.' Hǎo ràng wǒmen měitiān dōu fàngxīn na.",lesson:"3과",level:3},
{zh:"大爷，我就放两分钟，到这座楼里找个人，马上就出来。",ko:"어르신, 저는 딱 2분만이에요, 이 건물 안에서 사람 좀 찾고 바로 나올게요.",pinyin:"Dàyé, wǒ jiù fàng liǎng fēnzhōng, dào zhè zuò lóu lǐ zhǎo ge rén, mǎshàng jiù chūlái.",lesson:"3과",level:2},
{zh:"那也不行啊。",ko:"그래도 안 돼요.",pinyin:"Nà yě bù xíng a.",lesson:"3과",level:1},
{zh:"要是有汽车开过来，碰倒了，碰坏了，怪谁呀？",ko:"만약 자동차가 지나오다가 부딪혀 쓰러지거나 망가지면, 누구 탓이에요?",pinyin:"Yàoshi yǒu qìchē kāi guòlái, pèng dǎo le, pèng huài le, guài shéi ya?",lesson:"3과",level:3},
{zh:"您还是放存车处吧，大家都方便，谢谢您了。",ko:"그래도 보관소에 두시는 게 낫겠어요, 모두에게 편하거든요, 감사합니다.",pinyin:"Nín háishi fàng cúnchē chù ba, dàjiā dōu fāngbiàn, xièxie nín le.",lesson:"3과",level:2},
{zh:"不好意思，大爷，您别说了。",ko:"죄송해요, 어르신, 더 말씀 안 하셔도 돼요.",pinyin:"Bù hǎoyìsi, dàyé, nín bié shuō le.",lesson:"3과",level:1},
{zh:"我听您的，立刻就放到存车处去。",ko:"말씀대로 할게요, 지금 바로 보관소에 갖다 놓을게요.",lesson:"3과",level:2,
pinyin:"Wǒ tīng nín de, lìkè jiù fàng dào cúnchē chù qù."},
{zh:"今天下午，本市又发生了一起交通事故。",ko:"오늘 오후 시내에서 또 교통사고가 한 건 발생했습니다.",pinyin:"Jīntiān xiàwǔ, běn shì yòu fāshēng le yī qǐ jiāotōng shìgù.",lesson:"3과",level:2,words:["今天下午", "本市", "又", "发生了", "一起", "交通事故"]},
{zh:"一个汽车司机酒后开车，闯了红灯撞了一辆从南往北开的公共汽车，结果一人重伤，两人轻伤。",ko:"한 자동차 운전자가 음주운전을 하다가 빨간불을 무시하고 남쪽에서 북쪽으로 가는 버스를 들이받아, 결국 한 명이 중상을 입고 두 명이 경상을 입었습니다.",pinyin:"Yī ge qìchē sījī jiǔhòu kāichē, chuǎng le hóngdēng zhuàng le yī liàng cóng nán wǎng běi kāi de gōnggòng qìchē, jiéguǒ yī rén zhòngshāng, liǎng rén qīngshāng.",lesson:"3과",level:3},
// ── 4과 추가 ──
{zh:"快说，咱们吃什么？服务员等着呢。",ko:"빨리 말해요, 우리 뭐 먹을 거예요? 종업원이 기다리고 있어요.",pinyin:"Kuài shuō, zánmen chī shénme? Fúwùyuán děng zhe ne.",lesson:"4과",level:1},
{zh:"来个尖椒牛肉吧。",ko:"청양고추 쇠고기 볶음 하나 주문해요.",pinyin:"Lái ge jiānjiāo niúròu ba.",lesson:"4과",level:1,words:["来个", "尖椒牛肉", "吧"]},
{zh:"好，辣的，我爱吃。",ko:"좋아요, 매운 거요, 저 좋아해요.",pinyin:"Hǎo, là de, wǒ ài chī.",lesson:"4과",level:1},
{zh:"我想要个炒蘑菇。再来个鱼吧。",ko:"저는 버섯볶음을 원해요. 생선 요리도 하나 더 시켜요.",pinyin:"Wǒ xiǎng yào ge chǎo mógu. Zài lái ge yú ba.",lesson:"4과",level:1,words:["我", "想要", "个", "炒蘑菇", "再来", "个", "鱼", "吧"]},
{zh:"我从小就不爱吃鱼。不论怎么做，我都不爱吃。",ko:"저는 어릴 때부터 생선을 좋아하지 않아요. 어떻게 만들어도 입에 안 맞아요.",pinyin:"Wǒ cóngxiǎo jiù bú ài chī yú. Bùlùn zěnme zuò, wǒ dōu bú ài chī.",lesson:"4과",level:1},
{zh:"这儿的鱼不错，尝一次，也许你就爱吃了。来一个吧。",ko:"여기 생선이 맛있어요, 한번 먹어봐요, 어쩌면 좋아하게 될지도 몰라요. 하나 시켜요.",pinyin:"Zhèr de yú búcuò, cháng yī cì, yěxǔ nǐ jiù ài chī le. Lái yī ge ba.",lesson:"4과",level:2},
{zh:"现在吃，还来得及吗？",ko:"지금 먹으면 아직 늦지 않았을까요?",pinyin:"Xiànzài chī, hái láidejí ma?",lesson:"4과",level:1,words:["现在", "吃", "还", "来得及", "吗"]},
{zh:"好吧，陪你们吃，来一个就来一个吧。",ko:"그래요, 여러분 먹는 데 같이 끼워줘요, 하나 시키죠 뭐.",pinyin:"Hǎo ba, péi nǐmen chī, lái yī ge jiù lái yī ge ba.",lesson:"4과",level:2},
{zh:"三个菜，够了，再来三杯可乐。",ko:"요리 세 가지면 충분해요, 콜라 세 잔 더 주세요.",pinyin:"Sān ge cài, gòu le, zài lái sān bēi kělè.",lesson:"4과",level:1,words:["三个菜", "够了", "再来", "三杯", "可乐"]},
{zh:"主食要什么？",ko:"주식은 뭘로 드릴까요?",pinyin:"Zhǔshí yào shénme?",lesson:"4과",level:1,words:["主食", "要", "什么"]},
{zh:"一人一碗米饭吧。",ko:"한 사람당 밥 한 공기씩 해요.",pinyin:"Yī rén yī wǎn mǐfàn ba.",lesson:"4과",level:1,words:["一人", "一碗", "米饭", "吧"]},
{zh:"我现在又渴又饿。",ko:"저는 지금 목도 마르고 배도 고파요.",pinyin:"Wǒ xiànzài yòu kě yòu è.",lesson:"4과",level:1,words:["我", "现在", "又", "渴", "又", "饿"]},
{zh:"服务员，麻烦您快点儿行吗？",ko:"종업원, 좀 빨리 해주실 수 있나요?",pinyin:"Fúwùyuán, máfan nín kuài diǎnr xíng ma?",lesson:"4과",level:1},
{zh:"是啊，明天就是一个节日。",ko:"네, 내일이 바로 명절이에요.",pinyin:"Shì a, míngtiān jiù shì yī ge jiérì.",lesson:"4과",level:1,words:["是啊", "明天", "就是", "一个", "节日"]},
{zh:"什么节？",ko:"무슨 명절이에요?",pinyin:"Shénme jié?",lesson:"4과",level:1},
{zh:"放假吗？",ko:"쉬어요?",pinyin:"Fàng jià ma?",lesson:"4과",level:1,words:["放假", "吗"]},
{zh:"放。那天家家都吃粽子。",ko:"쉬어요. 그날은 집집마다 쫑즈를 먹어요.",pinyin:"Fàng. Nà tiān jiājiā dōu chī zòngzi.",lesson:"4과",level:1,words:["放", "那天", "家家", "都", "吃", "粽子"]},
{zh:"什么是粽子？",ko:"쫑즈가 뭐예요?",pinyin:"Shénme shì zòngzi?",lesson:"4과",level:1,words:["什么", "是", "粽子"]},
{zh:"粽子嘛，这样吧，我奶奶年年都包，明天你去我家，咱们一起包，一起吃。",ko:"쫑즈 말이에요, 이렇게 해요, 우리 할머니가 매년 만드시거든요, 내일 우리 집에 와서 같이 만들고 같이 먹어요.",pinyin:"Zòngzi ma, zhèyàng ba, wǒ nǎinai niánnián dōu bāo, míngtiān nǐ qù wǒ jiā, zánmen yīqǐ bāo, yīqǐ chī.",lesson:"4과",level:3},
{zh:"我从来没吃过粽子，真好吃！",ko:"쫑즈를 먹어본 적이 없었는데, 정말 맛있어요!",pinyin:"Wǒ cónglái méi chī guò zòngzi, zhēn hǎo chī!",lesson:"4과",level:1},
{zh:"好吃也得少吃点儿，还有好多菜呢。",ko:"맛있어도 조금만 먹어요, 요리가 아직 많이 남았어요.",pinyin:"Hǎo chī yě děi shǎo chī diǎnr, hái yǒu hǎo duō cài ne.",lesson:"4과",level:2},
{zh:"刚才咱们都在包粽子，是谁做了这么多菜？",ko:"방금까지 우리 모두 쫑즈를 만들고 있었는데, 이 많은 요리는 누가 만들었어요?",pinyin:"Gāngcái zánmen dōu zài bāo zòngzi, shì shéi zuò le zhème duō cài?",lesson:"4과",level:2},
{zh:"是我叫的外卖。",ko:"제가 배달 음식을 시킨 거예요.",pinyin:"Shì wǒ jiào de wàimài.",lesson:"4과",level:1,words:["是", "我", "叫的", "外卖"]},
{zh:"叫外卖？好办法！",ko:"배달 음식을요? 좋은 생각이에요!",pinyin:"Jiào wàimài? Hǎo bànfǎ!",lesson:"4과",level:1,words:["叫外卖", "好办法"]},
// ── 5과 추가 ──
{zh:"你怎么又迟到了？看看表，都几点了？",ko:"어떻게 또 지각이에요? 시계 좀 봐요, 지금 몇 시예요?",pinyin:"Nǐ zěnme yòu chídào le? Kànkan biǎo, dōu jǐ diǎn le?",lesson:"5과",level:1},
{zh:"实在对不起！",ko:"정말 죄송해요!",pinyin:"Shízài duìbuqǐ!",lesson:"5과",level:1,words:["实在", "对不起"]},
{zh:"打辆的吧，又碰上堵车。你说倒霉不倒霉？",ko:"택시를 잡아탔더니 또 교통 체증에 걸리고 말았어요. 이게 재수 없는 거 아니에요?",pinyin:"Dǎ liàng dī ba, yòu pèng shàng dǔ chē. Nǐ shuō dǎoméi bù dǎoméi?",lesson:"5과",level:2},
{zh:"你总是有那么多理由。",ko:"당신은 왜 이렇게 매번 핑계가 많아요.",pinyin:"Nǐ zǒngshì yǒu nàme duō lǐyóu.",lesson:"5과",level:1},
{zh:"好了，别生气了，原谅我吧。下回……",ko:"알았어요, 이제 화 풀어요, 제발 용서해줘요. 다음번엔…",pinyin:"Hǎo le, bié shēngqì le, yuánliàng wǒ ba. Xià huí……",lesson:"5과",level:1},
{zh:"每次约会你都迟到，下回谁还相信你呀？你以为我有的是时间等你呀？",ko:"매번 데이트마다 늦으면서, 다음에 누가 당신을 믿겠어요? 내가 당신을 기다릴 시간이 넘쳐나는 줄 알아요?",pinyin:"Měi cì yuēhuì nǐ dōu chídào, xià huí shéi hái xiāngxìn nǐ ya? Nǐ yǐwéi wǒ yǒude shì shíjiān děng nǐ ya?",lesson:"5과",level:3},
{zh:"别动！快拿镜子来！",ko:"움직이지 말아요! 빨리 거울 가져와요!",pinyin:"Bié dòng! Kuài ná jìngzi lái!",lesson:"5과",level:1,words:["别动", "快", "拿", "镜子", "来"]},
{zh:"干什么？",ko:"왜요?",pinyin:"Gàn shénme?",lesson:"5과",level:1,words:["干", "什么"]},
{zh:"照照你生气的样子，可好看了。",ko:"화난 당신 모습 좀 봐요, 정말 볼만하네요.",pinyin:"Zhàozhao nǐ shēngqì de yàngzi, kě hǎokàn le.",lesson:"5과",level:2},
{zh:"你呀……",ko:"당신은 정말…",pinyin:"Nǐ ya……",lesson:"5과",level:1},
{zh:"怎么还不睡呀？",ko:"왜 아직 안 자요?",pinyin:"Zěnme hái bù shuì ya?",lesson:"5과",level:1,words:["怎么", "还", "不睡", "呀"]},
{zh:"我给我妈写了封E-mail，告诉她我有男朋友了。",ko:"엄마한테 이메일을 썼어요, 남자친구가 생겼다고 알려드렸어요.",pinyin:"Wǒ gěi wǒ mā xiě le fēng E-mail, gàosu tā wǒ yǒu nánpéngyou le.",lesson:"5과",level:2},
{zh:"告诉她以后，我又有担心。",ko:"알려드린 다음에 또 걱정이 생겼어요.",pinyin:"Gàosu tā yǐhòu, wǒ yòu yǒu dānxīn.",lesson:"5과",level:1},
{zh:"她一定为你高兴，你担心什么呢？",ko:"분명 당신 때문에 기뻐하실 텐데, 뭐가 걱정이에요?",pinyin:"Tā yīdìng wèi nǐ gāoxìng, nǐ dānxīn shénme ne?",lesson:"5과",level:2},
{zh:"她高兴我知道。可是我担心的是另一方面。",ko:"엄마가 기뻐하실 거라는 건 알아요. 하지만 제가 걱정하는 건 다른 면이에요.",pinyin:"Tā gāoxìng wǒ zhīdào. Kěshì wǒ dānxīn de shì lìng yīfāngmiàn.",lesson:"5과",level:2},
{zh:"哪方面？",ko:"어떤 면이요?",pinyin:"Nǎ fāngmiàn?",lesson:"5과",level:1,words:["哪", "方面"]},
{zh:"你没听说过'爱是不分国界的'吗？重要的是你们俩真心相爱。",ko:"'사랑은 국경이 없다'는 말을 들어본 적 없어요? 중요한 건 두 사람이 진심으로 사랑하는 거예요.",pinyin:"Nǐ méi tīngshuō guò 'ài shì bù fēn guójiè de' ma? Zhòngyào de shì nǐmen liǎ zhēnxīn xiāng'ài.",lesson:"5과",level:3},
{zh:"虽然文化不同，习惯也不同，可是你们俩在一起，不是很幸福吗？",ko:"비록 문화도 다르고 습관도 다르지만, 두 사람이 함께 있으면 행복하지 않나요?",pinyin:"Suīrán wénhuà bùtóng, xíguàn yě bùtóng, kěshì nǐmen liǎ zài yīqǐ, bú shì hěn xìngfú ma?",lesson:"5과",level:3},
{zh:"这就够了，不要管别人怎么想。",ko:"그걸로 충분해요, 다른 사람이 어떻게 생각하는지는 신경 쓰지 말아요.",pinyin:"Zhè jiù gòu le, bú yào guǎn biérén zěnme xiǎng.",lesson:"5과",level:2,words:["这就", "够了", "不要", "管", "别人", "怎么想"]},
{zh:"可是我妈不是别人哪！",ko:"하지만 우리 엄마는 남이 아니잖아요!",pinyin:"Kěshì wǒ mā bú shì biérén na!",lesson:"5과",level:2,words:["可是", "我妈", "不是", "别人", "哪"]},
{zh:"你应该想办法让她明白：他是你最理想的爱人，你们俩在一起真的很合适，光担心是不能解决问题的。",ko:"방법을 생각해서 엄마를 이해시켜야 해요: 그가 당신의 가장 이상적인 배우자이고, 두 사람이 함께하면 정말 잘 어울린다는 것을요, 걱정만 해서는 문제를 해결할 수 없어요.",pinyin:"Nǐ yīnggāi xiǎng bànfǎ ràng tā míngbai: tā shì nǐ zuì lǐxiǎng de àirén, nǐmen liǎ zài yīqǐ zhēn de hěn héshì, guāng dānxīn shì bù néng jiějué wèntí de.",lesson:"5과",level:3},
{zh:"你说得对，今年暑假我一定带他去见见我妈。我相信他会得满分。",ko:"당신 말이 맞아요, 올 여름방학에는 꼭 그를 데리고 가서 엄마께 인사시킬 거예요. 그가 만점을 받을 거라 믿어요.",pinyin:"Nǐ shuō de duì, jīnnián shǔjià wǒ yīdìng dài tā qù jiànjiàn wǒ mā. Wǒ xiāngxìn tā huì dé mǎnfēn.",lesson:"5과",level:3},
// ── 6과 추가 ──
{zh:"你怎么能发现的？",ko:"어떻게 알게 됐어요?",pinyin:"Nǐ zěnme néng fāxiàn de?",lesson:"6과",level:1,words:["你", "怎么能", "发现的"]},
{zh:"每天不论早上还是傍晚，在公园里，总能看见跳舞的老人，他们穿得红红绿绿的，挺有意思。",ko:"매일 아침이든 저녁이든 공원에서 알록달록하게 차려입고 춤추는 노인들을 늘 볼 수 있어요, 꽤 재미있어요.",pinyin:"Měitiān bùlùn zǎoshang háishi bàngwǎn, zài gōngyuán lǐ, zǒng néng kànjiàn tiàowǔ de lǎorén, tāmen chuān de hónghóng lǜlǜ de, tǐng yǒuyìsi.",lesson:"6과",level:3},
{zh:"老人也不是人人都爱跳舞。很多爱动的老人，更喜欢爬爬山，散散步什么的。",ko:"노인들이 모두 춤추기를 좋아하는 건 아니에요. 활동적인 노인들 중 많은 분들은 산에 오르거나 산책하는 걸 더 좋아해요.",pinyin:"Lǎorén yě bú shì rénrén dōu ài tiàowǔ. Hěn duō ài dòng de lǎorén, gèng xǐhuan páa pá shān, sàn san bù shénme de.",lesson:"6과",level:3},
{zh:"不爱动的老人做什么？",ko:"활동을 좋아하지 않는 노인들은 뭘 해요?",pinyin:"Bú ài dòng de lǎorén zuò shénme?",lesson:"6과",level:1,words:["不爱动的", "老人", "做", "什么"]},
{zh:"有的画画儿，练练书法，有的帮儿女带带孩子。",ko:"어떤 분들은 그림을 그리거나 서예를 연습하고, 어떤 분들은 자녀들이 아이 돌보는 걸 도와줘요.",pinyin:"Yǒude huà huàr, liànlian shūfǎ, yǒude bāng érnǚ dài dai háizi.",lesson:"6과",level:2},
{zh:"我看，爱动不爱动都不重要，重要的是心不能老，心一老比什么都可怕。",ko:"제 생각엔, 활동적이든 아니든 다 상관없어요, 중요한 건 마음만은 늙어선 안 된다는 거예요, 마음이 늙으면 그 무엇보다 무섭거든요.",pinyin:"Wǒ kàn, ài dòng bú ài dòng dōu bú zhòngyào, zhòngyào de shì xīn bù néng lǎo, xīn yī lǎo bǐ shénme dōu kěpà.",lesson:"6과",level:3},
{zh:"对。我常常看到外国的老人来中国旅游，年纪那么大了，头发都白了，可是精神非常好，让谁看了都羡慕。",ko:"맞아요. 저는 외국 노인들이 중국으로 여행 오는 걸 자주 봐요, 그렇게 연세가 많고 머리카락도 다 세었지만 정말 기운이 넘쳐서 누가 봐도 부러울 정도예요.",pinyin:"Duì. Wǒ chángcháng kàndào wàiguó de lǎorén lái Zhōngguó lǚyóu, niánjì nàme dà le, tóufa dōu bái le, kěshì jīngshén fēicháng hǎo, ràng shéi kàn le dōu xiànmù.",lesson:"6과",level:3},
{zh:"这样的人当然幸福，不过能出来旅游得并不多。",ko:"그런 분들은 당연히 행복하겠죠, 하지만 그렇게 나와서 여행할 수 있는 분들이 그리 많지는 않아요.",pinyin:"Zhèyàng de rén dāngrán xìngfú, búguò néng chūlái lǚyóu de bìng bù duō.",lesson:"6과",level:2},
{zh:"有。但是有的老人不愿意去，他们觉得在哪儿也不如在家好。",ko:"있어요. 하지만 어떤 노인들은 가기 싫어해요, 어디를 가도 집보다 좋은 곳은 없다고 생각하거든요.",pinyin:"Yǒu. Dànshì yǒude lǎorén bù yuànyì qù, tāmen juéde zài nǎr yě bùrú zài jiā hǎo.",lesson:"6과",level:2},
{zh:"妈妈，您怎么哭了？",ko:"엄마, 왜 우세요?",pinyin:"Māma, nín zěnme kū le?",lesson:"6과",level:1,words:["妈妈", "您", "怎么", "哭了"]},
{zh:"没什么，是刚才看电视看的。",ko:"아무것도 아니에요, 아까 TV 보다 그랬어요.",pinyin:"Méi shénme, shì gāngcái kàn diànshì kàn de.",lesson:"6과",level:1,words:["没什么", "是", "刚才", "看电视", "看的"]},
{zh:"什么电视让您这么感动？",ko:"어떤 TV 프로그램이 이렇게 감동적이에요?",pinyin:"Shénme diànshì ràng nín zhème gǎndòng?",lesson:"6과",level:1,words:["什么", "电视", "让", "您", "这么", "感动"]},
{zh:"电视里说：有一位老人，她丈夫死了好多年了。她辛辛苦苦把孩子们都养大了。",ko:"TV에서 이런 내용이 나왔어요: 한 노인이 있었는데, 남편이 오래전에 세상을 떠났어요. 그녀는 고생스럽게 아이들을 다 키워냈어요.",pinyin:"Diànshì lǐ shuō: yǒu yī wèi lǎorén, tā zhàngfu sǐ le hǎo duō nián le. Tā xīnxīnkǔkǔ bǎ háizimen dōu yǎng dà le.",lesson:"6과",level:3},
{zh:"有一位老先生对她好，想和她组成新的家庭，可是儿女们都反对，她受不了，结果自杀了。",ko:"한 노신사가 그녀를 잘 대해주고 새로운 가정을 꾸리고 싶어했는데, 자녀들이 모두 반대해서 그녀가 견디지 못하고 결국 스스로 목숨을 끊었어요.",pinyin:"Yǒu yī wèi lǎo xiānsheng duì tā hǎo, xiǎng hé tā zǔchéng xīn de jiātíng, kěshì érnǚmen dōu fǎnduì, tā shòu bu liǎo, jiéguǒ zìshā le.",lesson:"6과",level:3},
{zh:"他们的儿女怎么不多为父母想想，他们不希望父母幸福吗？",ko:"자녀들이 왜 부모 입장에서 좀 더 생각해 주지 않는 건가요, 부모가 행복하길 바라지 않는 건가요?",pinyin:"Tāmen de érnǚ zěnme bù duō wèi fùmǔ xiǎngxiang, tāmen bù xīwàng fùmǔ xìngfú ma?",lesson:"6과",level:3},
{zh:"是啊，真能理解老人的年轻人不多呀。",ko:"맞아요, 노인들을 진정으로 이해하는 젊은이가 많지 않아요.",pinyin:"Shì a, zhēn néng lǐjiě lǎorén de niánqīngrén bù duō ya.",lesson:"6과",level:2},
{zh:"说到这儿，我正有件事要跟您商量呢。",ko:"그 얘기가 나왔으니, 마침 어머니와 의논할 일이 하나 있어요.",pinyin:"Shuō dào zhèr, wǒ zhèng yǒu jiàn shì yào gēn nín shāngliang ne.",lesson:"6과",level:2},
{zh:"什么事？这么认真的样子。",ko:"무슨 일이에요? 이렇게 진지한 표정으로.",pinyin:"Shénme shì? Zhème rènzhēn de yàngzi.",lesson:"6과",level:1},
{zh:"人家刘伯伯对您那么好，经常关心和照顾您，对您也有那个意思，您怎么不考虑考虑？",ko:"류 아저씨가 어머니한테 그렇게 잘 해주시고, 항상 관심 가져주시고 돌봐주시고, 그 마음도 있으신데, 왜 한번 생각해 보지 않으세요?",pinyin:"Rénjiā Liú bóbo duì nín nàme hǎo, jīngcháng guānxīn hé zhàogù nín, duì nín yě yǒu nà ge yìsi, nín zěnme bù kǎolǜ kǎolǜ?",lesson:"6과",level:3},
{zh:"这个，我知道他的意思，可是……",ko:"그건, 그분 마음은 알아요, 하지만……",pinyin:"Zhège, wǒ zhīdào tā de yìsi, kěshì……",lesson:"6과",level:1,words:["这个", "我", "知道", "他的", "意思", "可是"]},
{zh:"您担心什么呀？",ko:"뭐가 걱정이세요?",pinyin:"Nín dānxīn shénme ya?",lesson:"6과",level:1,words:["您", "担心", "什么", "呀"]},
{zh:"我是担心你有想法。我觉得有你就够了。",ko:"네가 어떻게 생각할까봐 걱정이야. 나는 네가 있으면 충분해.",pinyin:"Wǒ shì dānxīn nǐ yǒu xiǎngfǎ. Wǒ juéde yǒu nǐ jiù gòu le.",lesson:"6과",level:2},
{zh:"还有别人怎么看呢？",ko:"그리고 다른 사람들이 어떻게 볼지도 신경 쓰이고요.",pinyin:"Hái yǒu biérén zěnme kàn ne?",lesson:"6과",level:1,words:["还有", "别人", "怎么看", "呢"]},
// ── 7과 추가 ──
{zh:"回家看爸妈。",ko:"집에 가서 부모님 뵈러요.",pinyin:"Huí jiā kàn bàmā.",lesson:"7과",level:1,words:["回家", "看", "爸妈"]},
{zh:"你好像每个周末都回去。",ko:"매주 주말마다 돌아가는 것 같네요.",pinyin:"Nǐ hǎoxiàng měi ge zhōumò dōu huí qù.",lesson:"7과",level:1},
{zh:"是啊，大家在一起热闹。",ko:"네, 다 같이 있으면 왁자지껄 즐거워요.",pinyin:"Shì a, dàjiā zài yīqǐ rènao.",lesson:"7과",level:1,words:["是啊", "大家", "在", "一起", "热闹"]},
{zh:"做做饭，看看电视，收拾收拾房间，饭桌上一起聊聊天儿。",ko:"밥도 같이 짓고, TV도 보고, 방도 치우고, 밥상에 둘러앉아 도란도란 얘기도 나눠요.",pinyin:"Zuòzuo fàn, kànkan diànshì, shōushi shōushi fángjiān, fànzhuō shàng yīqǐ liáoliao tiānr.",lesson:"7과",level:2},
{zh:"不想自己轻松轻松？",ko:"혼자서 좀 편하게 쉬고 싶지 않아요?",pinyin:"Bù xiǎng zìjǐ qīngsōng qīngsōng?",lesson:"7과",level:1,words:["不想", "自己", "轻松", "轻松"]},
{zh:"想是想，可是一想起他们在家里等着，就不好意思自己玩儿去了。",ko:"그러고 싶긴 한데, 부모님이 집에서 기다리고 계신다고 생각하면 혼자 놀러 가기가 미안해요.",pinyin:"Xiǎng shì xiǎng, kěshì yī xiǎngqǐ tāmen zài jiā lǐ děng zhe, jiù bù hǎoyìsi zìjǐ wánr qù le.",lesson:"7과",level:3},
{zh:"大家一起出去玩儿也可以呀。",ko:"다 같이 나가서 놀면 되잖아요.",pinyin:"Dàjiā yīqǐ chūqu wánr yě kěyǐ ya.",lesson:"7과",level:1,words:["大家", "一起", "出去", "玩儿", "也", "可以", "呀"]},
{zh:"你说得有道理，可是他们觉得这样花钱不值得。",ko:"당신 말도 맞아요, 하지만 부모님은 그렇게 돈 쓰는 게 가치 없다고 생각하세요.",pinyin:"Nǐ shuō de yǒu dàolǐ, kěshì tāmen juéde zhèyàng huā qián bù zhíde.",lesson:"7과",level:2},
{zh:"可能是吧。",ko:"그럴 수도 있겠죠.",pinyin:"Kěnéng shì ba.",lesson:"7과",level:1,words:["可能", "是", "吧"]},
{zh:"那你就在家待着吗？",ko:"그럼 그냥 집에서만 있는 거예요?",pinyin:"Nà nǐ jiù zài jiā dāi zhe ma?",lesson:"7과",level:1,words:["那", "你", "就", "在家", "待着", "吗"]},
{zh:"我觉得，和他们一起过周末，常常能学到一些书本上学不到的东西，也挺有收获的。",ko:"제 생각에는, 부모님과 함께 주말을 보내면 교과서에서는 배울 수 없는 것들을 배울 수 있어서 꽤 보람 있어요.",pinyin:"Wǒ juéde, hé tāmen yīqǐ guò zhōumò, chángcháng néng xué dào yīxiē shūběn shàng xué bú dào de dōngxi, yě tǐng yǒu shōuhuò de.",lesson:"7과",level:3},
{zh:"马上就洗完了。",ko:"곧 다 빨아요.",pinyin:"Mǎshàng jiù xǐ wán le.",lesson:"7과",level:1,words:["马上", "就", "洗完了"]},
{zh:"你先去吃水果吧，知道你回来，我已经给你准备好了。",ko:"먼저 가서 과일 먹어요, 당신 온다는 거 알고 미리 준비해 뒀어요.",pinyin:"Nǐ xiān qù chī shuǐguǒ ba, zhīdào nǐ huílái, wǒ yǐjīng gěi nǐ zhǔnbèi hǎo le.",lesson:"7과",level:2},
{zh:"您怎么不用洗衣机洗呀？",ko:"왜 세탁기를 안 쓰세요?",pinyin:"Nín zěnme bú yòng xǐyījī xǐ ya?",lesson:"7과",level:1,words:["您", "怎么", "不用", "洗衣机", "洗", "呀"]},
{zh:"那买洗衣机有什么用？",ko:"그럼 세탁기를 사서 뭐 해요?",pinyin:"Nà mǎi xǐyījī yǒu shénme yòng?",lesson:"7과",level:1,words:["那", "买", "洗衣机", "有什么用"]},
{zh:"我用手洗惯了，洗几件衣服还是锻炼身体呢。",ko:"손으로 빠는 게 익숙해져서요, 옷 몇 벌 빠는 것도 운동이 된다고요.",pinyin:"Wǒ yòng shǒu xǐ guàn le, xǐ jǐ jiàn yīfu háishi duànliàn shēntǐ ne.",lesson:"7과",level:2},
{zh:"要不，您就得听我的了。",ko:"아니면 어머니도 제 말을 들으셔야 할 거예요.",pinyin:"Yàobù, nín jiù děi tīng wǒ de le.",lesson:"7과",level:2,words:["要不", "您", "就得", "听", "我的了"]},
{zh:"你周末怎么过的？",ko:"주말을 어떻게 보냈어요?",pinyin:"Nǐ zhōumò zěnme guò de?",lesson:"7과",level:1,words:["你", "周末", "怎么", "过的"]},
{zh:"星期六和妻子、孩子一起回家看父母，星期天三口出去玩儿。",ko:"토요일에는 아내, 아이와 함께 부모님 뵈러 집에 갔고, 일요일에는 세 식구가 나가서 놀았어요.",pinyin:"Xīngqīliù hé qīzi, háizi yīqǐ huí jiā kàn fùmǔ, xīngqītiān sān kǒu chūqu wánr.",lesson:"7과",level:2},
{zh:"安排得不错嘛。你去哪儿玩儿了？",ko:"계획을 잘 세웠네요. 어디 가서 놀았어요?",pinyin:"Ānpái de búcuò ma. Nǐ qù nǎr wánr le?",lesson:"7과",level:1,words:["安排得", "不错", "嘛", "你", "去", "哪儿", "玩儿", "了"]},
{zh:"上午去了动物园，下午去附近的商场逛了逛。",ko:"오전에는 동물원에 갔고, 오후에는 근처 백화점을 둘러봤어요.",pinyin:"Shàngwǔ qù le dòngwùyuán, xiàwǔ qù fùjìn de shāngchǎng guàng le guàng.",lesson:"7과",level:2},
{zh:"春节是我爷爷八十岁生日，我们全家都回老家了。在那儿过春节比在北京热闹多了。",ko:"춘절이 우리 할아버지 팔순 생신이어서 온 가족이 고향으로 돌아갔어요. 거기서 춘절을 보내는 게 베이징보다 훨씬 더 활기차고 떠들썩해요.",pinyin:"Chūnjié shì wǒ yéye bāshí suì shēngrì, wǒmen quánjiā dōu huí lǎojiā le. Zài nàr guò Chūnjié bǐ zài Běijīng rènao duō le.",lesson:"부록",level:3},
{zh:"我就进去点了一菜一汤，不但味道好得很，而且价钱十分便宜，服务也挺周到的。",ko:"들어가서 요리 하나에 국 하나를 시켰는데, 맛도 정말 좋고, 가격도 매우 저렴하고, 서비스도 꽤 꼼꼼하고 친절해요.",pinyin:"Wǒ jiù jìnqù diǎn le yī cài yī tāng, búdàn wèidao hǎo de hěn, érqiě jiàqian shífēn piányí, fúwù yě tǐng zhōudào de.",lesson:"부록",level:2},
{zh:"后来我又去过很多次，回回满意。",ko:"나중에 또 여러 번 갔는데, 갈 때마다 만족스러웠어요.",pinyin:"Hòulái wǒ yòu qù guò hěn duō cì, huí huí mǎnyì.",lesson:"부록",level:2,words:["后来", "我", "又", "去过", "很多次", "回回", "满意"]},
{zh:"还有，就是他受过很好的教育，人好，心好，性格好，周围的朋友也都不错。",ko:"게다가 그는 좋은 교육을 받았고, 사람도 좋고, 마음씨도 좋고, 성격도 좋고, 주변 친구들도 다 괜찮아요.",pinyin:"Hái yǒu, jiù shì tā shòu guò hěn hǎo de jiàoyù, rén hǎo, xīn hǎo, xìnggé hǎo, zhōuwéi de péngyou yě dōu búcuò.",lesson:"부록",level:3},
{zh:"见了面，您就会相信他确实是个值得我爱的人。",ko:"만나보시면 그가 정말 제가 사랑할 만한 사람이라는 걸 믿게 되실 거예요.",pinyin:"Jiàn le miàn, nín jiù huì xiāngxìn tā quèshí shì ge zhíde wǒ ài de rén.",lesson:"부록",level:3},
{zh:"要是等老得走不动了，牙也掉光了，再用这些钱打针，吃药，住医院，那多没意思呀？",ko:"만약 늙어서 걸어 다니지도 못하게 되고, 이도 다 빠진 다음에 그 돈으로 주사 맞고 약 먹고 병원 입원하면, 그게 얼마나 재미없겠어요?",pinyin:"Yàoshi děng lǎo de zǒu bú dòng le, yá yě diào guāng le, zài yòng zhèxiē qián dǎzhēn, chī yào, zhù yīyuàn, nà duō méi yìsi ya?",lesson:"부록",level:3},
// ── 문법 예문 (부록) ──
{zh:"快把窗户关上。",ko:"빨리 창문 닫아요.",pinyin:"Kuài bǎ chuānghù guān shàng.",lesson:"1과",level:1,words:["快", "把", "窗户", "关上"]},
{zh:"快把手洗干净。",ko:"빨리 손 깨끗이 씻어요.",pinyin:"Kuài bǎ shǒu xǐ gānjìng.",lesson:"1과",level:1,words:["快", "把", "手", "洗干净"]},
{zh:"快把酒打开。",ko:"빨리 술 열어요.",pinyin:"Kuài bǎ jiǔ dǎ kāi.",lesson:"1과",level:1,words:["快", "把", "酒", "打开"]},
{zh:"我以为你知道周末聚会的事。",ko:"당신이 주말 모임에 대해 알고 있는 줄 알았어요.",pinyin:"Wǒ yǐwéi nǐ zhīdào zhōumò jùhuì de shì.",lesson:"1과",level:2,words:["我", "以为", "你", "知道", "周末", "聚会的", "事"]},
{zh:"我以为他已经走了。",ko:"그가 이미 떠난 줄 알았어요.",pinyin:"Wǒ yǐwéi tā yǐjīng zǒu le.",lesson:"1과",level:1,words:["我", "以为", "他", "已经", "走了"]},
{zh:"我以为她给你们介绍过。",ko:"그녀가 당신들에게 소개해 준 줄 알았어요.",pinyin:"Wǒ yǐwéi tā gěi nǐmen jièshào guò.",lesson:"1과",level:2},
{zh:"病得一定很厉害吧？",ko:"병이 꽤 심했겠죠?",pinyin:"Bìng de yīdìng hěn lìhai ba?",lesson:"1과",level:1},
{zh:"吃得一定很满意吧？",ko:"먹는 게 정말 만족스러웠겠죠?",pinyin:"Chī de yīdìng hěn mǎnyì ba?",lesson:"1과",level:1},
{zh:"看得一定很清楚吧？",ko:"아주 잘 보였겠죠?",pinyin:"Kàn de yīdìng hěn qīngchǔ ba?",lesson:"1과",level:1},
{zh:"我什么也没说。",ko:"저는 아무 말도 안 했어요.",pinyin:"Wǒ shénme yě méi shuō.",lesson:"1과",level:1,words:["我", "什么也", "没说"]},
{zh:"我谁也不认识。",ko:"저는 아무도 몰라요.",pinyin:"Wǒ shéi yě bú rènshi.",lesson:"1과",level:1,words:["我", "谁也", "不认识"]},
{zh:"我哪个也没买。",ko:"저는 아무것도 안 샀어요.",pinyin:"Wǒ nǎ ge yě méi mǎi.",lesson:"1과",level:1,words:["我", "哪个也", "没买"]},
{zh:"这个大学是由二十几个系组成的。",ko:"이 대학은 20여 개 학과로 구성되어 있어요.",pinyin:"Zhège dàxué shì yóu èrshí jǐ ge xì zǔchéng de.",lesson:"1과",level:2},
{zh:"那个大公司是由几个小公司组成的。",ko:"그 대기업은 몇 개의 소규모 회사로 구성되어 있어요.",pinyin:"Nàge dà gōngsī shì yóu jǐ ge xiǎo gōngsī zǔchéng de.",lesson:"1과",level:2},
{zh:"中国是由五十六个民族组成的。",ko:"중국은 56개 민족으로 구성되어 있어요.",pinyin:"Zhōngguó shì yóu wǔshíliù ge mínzú zǔchéng de.",lesson:"2과",level:2,words:["中国", "是", "由", "五十六个", "民族", "组成的"]},
{zh:"谁水平高谁水平低让他们比一比就知道了。",ko:"누구 수준이 높고 낮은지 그들끼리 한번 겨루면 알 수 있어요.",pinyin:"Shéi shuǐpíng gāo shéi shuǐpíng dī ràng tāmen bǐ yi bǐ jiù zhīdào le.",lesson:"2과",level:3},
{zh:"谁学得好谁学得差他们的老师最了解了。",ko:"누가 잘 배우고 누가 못 배우는지 그들의 선생님이 가장 잘 알아요.",pinyin:"Shéi xué de hǎo shéi xué de chà tāmen de lǎoshī zuì liǎojiě le.",lesson:"2과",level:3},
{zh:"谁该罚谁不该罚都得听裁判的。",ko:"누구를 벌줘야 하고 누구는 안 되는지 심판의 말을 따라야 해요.",pinyin:"Shéi gāi fá shéi bù gāi fá dōu děi tīng cáipàn de.",lesson:"2과",level:3},
{zh:"实在抱歉，我忘了告诉你。",ko:"정말 죄송해요, 알려드리는 걸 깜빡했어요.",pinyin:"Shízài bàoqiàn, wǒ wàng le gàosu nǐ.",lesson:"2과",level:1,words:["实在抱歉", "我", "忘了", "告诉", "你"]},
{zh:"实在抱歉，您的车我还没修好。",ko:"정말 죄송해요, 손님 차를 아직 다 고치지 못했어요.",pinyin:"Shízài bàoqiàn, nín de chē wǒ hái méi xiū hǎo.",lesson:"2과",level:1},
{zh:"实在抱歉，我的手机没电了。",ko:"정말 죄송해요, 제 휴대폰 배터리가 없어요.",pinyin:"Shízài bàoqiàn, wǒ de shǒujī méi diàn le.",lesson:"2과",level:1,words:["实在抱歉", "我的", "手机", "没电了"]},
{zh:"女儿和妈妈一样，都是大夫。",ko:"딸도 엄마처럼 모두 의사예요.",pinyin:"Nǚér hé māma yīyàng, dōu shì dàifu.",lesson:"2과",level:1,words:["女儿", "和", "妈妈", "一样", "都是", "大夫"]},
{zh:"我和你一样，都是影迷。",ko:"저도 당신처럼 영화 팬이에요.",pinyin:"Wǒ hé nǐ yīyàng, dōu shì yǐngmí.",lesson:"2과",level:1,words:["我", "和", "你", "一样", "都是", "影迷"]},
{zh:"我们大学和北大一样，都是有名的大学。",ko:"우리 대학도 베이징대학처럼 유명한 대학이에요.",pinyin:"Wǒmen dàxué hé Běidà yīyàng, dōu shì yǒumíng de dàxué.",lesson:"2과",level:2},
{zh:"劳驾，麻烦您让一让，我要下车。",ko:"실례합니다, 좀 비켜주세요, 저 내려야 해요.",pinyin:"Láojià, máfan nín ràng yi ràng, wǒ yào xià chē.",lesson:"3과",level:1,words:["劳驾", "麻烦您", "让一让", "我", "要", "下车"]},

let cfg = { types:['write','blank','pinyin','order'], level:'easy', count:20, lessons:['1과','2과','3과','4과','5과','6과','7과','부록'], range:'all' };

═══════════════════════════════════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen,.record-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const inExam = id==='questionScreen';
  document.getElementById('hudArea').style.display = inExam?'flex':'none';
  // 시험 화면이면 탭 보이기
  document.getElementById('mainTabs').style.display = id==='questionScreen'?'none':'flex';
}

function toggleType(t,el){
  el.classList.toggle('selected');
  const sel = [...document.querySelectorAll('.type-btn.selected')].map(b=>b.dataset.type);
  cfg.types = sel;
  document.getElementById('startBtn').disabled = sel.length===0;
}
function selectLevel(l,el){
  document.querySelectorAll('.config-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  cfg.level = l;
}
function selectCount(n,el){
  document.querySelectorAll('[data-count]').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  cfg.count = n;
}

/* ═══════════════════════════════════════════════════
   BUILD QUEUE
═══════════════════════════════════════════════════ */
function buildQueue(){
  const lv = levelMap[cfg.level];
  const pool = [];

  if(cfg.types.includes('write')||cfg.types.includes('pinyin')||cfg.types.includes('order')){
    const filtered = ALL.filter(q=>{
      const levelOk = cfg.level==='easy'?q.level===1:cfg.level==='mid'?q.level<=2:true;
      const lessonOk = cfg.lessons.includes(q.lesson);
      return levelOk && lessonOk;
    });
    filtered.forEach(q=>{
      if(cfg.types.includes('write')) pool.push({...q, type:'write'});
      if(cfg.types.includes('pinyin')) pool.push({...q, type:'pinyin'});
      if(cfg.types.includes('order')&&q.words&&q.words.length>=3) pool.push({...q, type:'order'});
    });
  }
  if(cfg.types.includes('blank')){
    const filtered = BLANKS.filter(q=>{
      const levelOk = cfg.level==='easy'?q.level===1:cfg.level==='mid'?q.level<=2:true;
      const lessonOk = cfg.lessons.includes(q.lesson);
      return levelOk && lessonOk;
    });
    filtered.forEach(q=>pool.push({...q, type:'blank'}));
  }

  // range 필터 적용
  const done=getDoneSents();
  const wrong=getWrongSents();

  let finalPool=pool;
  if(cfg.range==='new'){
    // 안 해본 문장 우선, 없으면 틀렸던 문장, 그 다음 전체
    const newSents=pool.filter(q=>!done.has(q.zh));
    const wrongSents=pool.filter(q=>done.has(q.zh)&&wrong.has(q.zh));
    const doneSents=pool.filter(q=>done.has(q.zh)&&!wrong.has(q.zh));
    // 우선순위: 새 문장 → 틀린 문장 → 맞은 문장
    finalPool=[...newSents,...wrongSents,...doneSents];
  } else if(cfg.range==='wrong'){
    const wrongOnly=pool.filter(q=>wrong.has(q.zh));
    finalPool=wrongOnly.length>0?wrongOnly:pool; // 틀린 게 없으면 전체
  }

  // shuffle (같은 우선순위 내에서만)
  if(cfg.range==='new'){
    // 구간별로 shuffle
    const newSents=finalPool.filter(q=>!done.has(q.zh));
    const wrongSents=finalPool.filter(q=>done.has(q.zh)&&wrong.has(q.zh));
    const doneSents=finalPool.filter(q=>done.has(q.zh)&&!wrong.has(q.zh));
    const sh=arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;};
    finalPool=[...sh(newSents),...sh(wrongSents),...sh(doneSents)];
  } else {
    for(let i=finalPool.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [finalPool[i],finalPool[j]]=[finalPool[j],finalPool[i]];
    }
  }

  return finalPool.slice(0, cfg.count===999?finalPool.length:cfg.count);
}

function startExam(){
  if(cfg.types.length===0) return;
  queue = buildQueue();
  curIdx = 0; score = 0; wrongItems = [];
  showScreen('questionScreen');
  renderQ();
}

    document.getElementById('typeIn').focus();

  } else if(q.type==='pinyin'){
    badge.className='q-badge qb-pinyin';
    badge.textContent='유형 3 · 병음 쓰기';
    qCard.innerHTML=`

      <div class="q-zh">${esc(q.zh)}</div>

    inp.focus();

  } else if(q.type==='order'){
    badge.className='q-badge qb-order';
    badge.textContent='유형 4 · 단어 순서 배열';
    const shuffled=shuffleArr([...q.words]);
    qCard.innerHTML=`
      <div class="q-lesson">${q.lesson}</div>
      <div class="q-ko" style="margin-bottom:14px">💬 ${esc(q.ko)}</div>
      <div class="order-label">📌 완성된 문장 (클릭해서 제거)</div>
      <div class="answer-zone" id="answerZone"></div>
      <div class="order-label">🃏 단어 카드 (클릭해서 선택)</div>
      <div class="word-chips" id="wordPool">
        ${shuffled.map((w,i)=>`<div class="word-chip" data-word="${esc(w)}" data-idx="${i}" onclick="placeWord(this)">${esc(w)}</div>`).join('')}
      </div>`;
    document.getElementById('actionRow').innerHTML=`
      <button class="btn btn-p" onclick="checkOrder()">✅ 확인</button>
      <button class="btn btn-g" onclick="resetOrder()">🔄 초기화</button>
      <button class="btn btn-g" onclick="skipQ()">⏭ 건너뛰기</button>`;

  } else {
    badge.className='q-badge qb-blank';
    badge.textContent='유형 2 · 빈칸 채우기';
    // shuffle choices
    const choices=[...q.choices].sort(()=>Math.random()-.5);
    qCard.innerHTML=`
      <div class="q-lesson">${q.lesson}</div>
      <div class="q-blank-sentence">${esc(q.zh)}</div>
      <div class="q-ko">💬 ${esc(q.ko)}</div>
      <div class="choices" style="margin-top:16px">
        ${choices.map(c=>`<button class="choice-btn" onclick="checkBlank('${esc(c)}')">${esc(c)}</button>`).join('')}
      </div>`;
    document.getElementById('actionRow').innerHTML=`<button class="btn btn-g" onclick="skipQ()">⏭ 건너뛰기</button>`;
  }

  document.getElementById('qNum').textContent=`${curIdx+1} / ${queue.length}`;
  document.getElementById('qLesson').textContent=q.lesson;
}

/* ── CHECK FUNCTIONS ── */
function normalizeZh(s){
  // 중국어 채점 정규화:
  // 1. 띄어쓰기 제거 (중국어는 띄어쓰기 불필요)
  // 2. 중국어/영문 구두점 통일 (？=? ！=! 。=. ，=,)
  // 3. 전각·반각 따옴표 제거
  return s
    .replace(/\s+/g,'')
    .replace(/？/g,'?')
    .replace(/！/g,'!')
    .replace(/。/g,'.')
    .replace(/，/g,',')
    .replace(/[""''「」『』…、]/g,'')
    .trim();
}

function checkWrite(){
  const q=queue[curIdx];
  const val=document.getElementById('typeIn').value.trim();
  if(!val) return;
  const inp=document.getElementById('typeIn');
  const ok=normalizeZh(val)===normalizeZh(q.zh);
  inp.classList.add(ok?'ok':'ng');
  if(!ok){ wrongItems.push({q,type:'write',userAns:val}); disableInput(); showNextBtn(); }
  else score+=10;
  showFb(ok, q, val, null, 'write');
}

function normalizePinyin(s){
  // 성조 변화 규칙 — 입력값과 정답 모두 동일하게 정규화해서 채점
  // 규칙:
  //   不: 4성 앞 → bú, 그 외 → bù  (채점 시 bú·bù 모두 허용)
  //   一: 4성 앞 → yí, 1/2/3성 앞 → yì, 단독 → yī  (채점 시 yī·yí·yì 모두 허용)
  //   → 모두 bu/yi로 통일해서 비교
  let r=s.toLowerCase();
  r=r.replace(/？/g,'?').replace(/！/g,'!').replace(/。/g,'.').replace(/，/g,',');
  r=r.replace(/[.!?,;:'"]/g,'').replace(/\s+/g,' ').trim();
  // 不 전체 형태 → bu
  r=r.replace(/bú/g,'bu').replace(/bù/g,'bu').replace(/bǔ/g,'bu').replace(/bū/g,'bu');
  // 一 전체 형태 → yi
  r=r.replace(/yī/g,'yi').replace(/yí/g,'yi').replace(/yì/g,'yi').replace(/yǐ/g,'yi');
  // 3성+3성 연독 허용: 3성 표기와 2성 표기 동일 취급
  r=r.replace(/ǎ/g,'a').replace(/á/g,'a').replace(/à/g,'a').replace(/ā/g,'a');
  r=r.replace(/ě/g,'e').replace(/é/g,'e').replace(/è/g,'e').replace(/ē/g,'e');
  r=r.replace(/ǐ/g,'i').replace(/í/g,'i').replace(/ì/g,'i').replace(/ī/g,'i');
  r=r.replace(/ǒ/g,'o').replace(/ó/g,'o').replace(/ò/g,'o').replace(/ō/g,'o');
  r=r.replace(/ǔ/g,'u').replace(/ú/g,'u').replace(/ù/g,'u').replace(/ū/g,'u');
  r=r.replace(/ǚ/g,'v').replace(/ǘ/g,'v').replace(/ǜ/g,'v').replace(/ǖ/g,'v');
  return r;
}

function checkPinyin(){
  const q=queue[curIdx];
  const val=document.getElementById('typeIn').value.trim();
  if(!val) return;
  const inp=document.getElementById('typeIn');
  const correct=q.pinyin.trim();

  let ok;
  if(cfg.level==='hard'){
    // 상급: 대소문자·띄어쓰기 엄격, 단 성조변화(不·一·3성연독)는 허용
    const normH=s=>normalizePinyin(s);
    ok=normH(val)===normH(correct);
  } else {
    // 하/중: 대소문자 무시 + 성조변화 허용
    ok=normalizePinyin(val)===normalizePinyin(correct);
  }

  // diff for feedback
  const diffHtml = buildDiff(val, correct);
  inp.classList.add(ok?'ok':'ng');
  if(!ok){ wrongItems.push({q,type:'pinyin',userAns:val}); disableInput(); showNextBtn(); }
  else score+=10;
  showFb(ok, q, val, diffHtml, 'pinyin');
}

function checkBlank(chosen){
  const q=queue[curIdx];
  const ok=chosen===q.answer;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer) b.classList.add('correct');
    else if(b.textContent===chosen&&!ok) b.classList.add('wrong');
  });
  if(!ok){ wrongItems.push({q,type:'blank',userAns:chosen}); showNextBtn(); }
  else score+=10;
  showFb(ok, q, chosen, null, 'blank');
}

// ── 단어 순서 배열 함수 ──
function shuffleArr(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

let orderPlaced=[]; // 배치된 단어 순서

function placeWord(el){
  if(el.classList.contains('placed')) return;
  el.classList.add('placed');
  const word=el.dataset.word;
  orderPlaced.push({word,el});
  const zone=document.getElementById('answerZone');
  if(zone){
    const chip=document.createElement('div');
    chip.className='word-chip';
    chip.textContent=word;
    chip.style.cursor='pointer';
    chip.onclick=()=>removeWord(chip,el);
    zone.appendChild(chip);
  }
}

function removeWord(chip,originalEl){
  chip.remove();
  originalEl.classList.remove('placed');
  orderPlaced=orderPlaced.filter(p=>p.el!==originalEl);
}

function resetOrder(){
  document.querySelectorAll('#wordPool .word-chip').forEach(el=>el.classList.remove('placed'));
  const zone=document.getElementById('answerZone');
  if(zone) zone.innerHTML='';
  orderPlaced=[];
}

function checkOrder(){
  const q=queue[curIdx];
  if(orderPlaced.length===0) return;
  const userWords=orderPlaced.map(p=>p.word);
  const correct=q.words;
  const ok=JSON.stringify(userWords)===JSON.stringify(correct);

  // 결과 표시
  const zone=document.getElementById('answerZone');
  zone.querySelectorAll('.word-chip').forEach((chip,i)=>{
    chip.classList.add(userWords[i]===correct[i]?'correct':'wrong');
    chip.onclick=null;
  });
  document.querySelectorAll('#wordPool .word-chip').forEach(el=>el.onclick=null);

  if(!ok){ wrongItems.push({q,type:'order',userAns:userWords.join(' ')}); showNextBtn(); }
  else score+=10;
  showFb(ok, q, userWords.join(' '), null, 'order');
}

function skipQ(){
  const q=queue[curIdx];
  saveWrongSent(q.zh);
  removeDoneSent(q.zh);
  wrongItems.push({q,type:q.type,userAns:'(건너뜀)'});
  showFb(false, q, '(건너뜀)', null, q.type);
  disableInput();
  showNextBtn();
}

/* ── FEEDBACK ── */
function showFb(ok, q, userAns, diffHtml, type){
  const fb=document.getElementById('fb');

  if(ok){
    // 정답: done에 기록 저장
    saveDoneSent(q.zh);
    fb.className='fb show ok';
    fb.innerHTML='✅ 정답!';
    setTimeout(()=>{
      const isLast=curIdx>=queue.length-1;
      if(isLast) showResult();
      else { curIdx++; renderQ(); }
    }, 600);
    return;
  }

  // 오답: wrong에 기록, done에서 제거
  saveWrongSent(q.zh);
  removeDoneSent(q.zh);

  // 오답: 정답 표시 + 다음 버튼
  fb.classList.add('show','ng');
  let html=`❌ 오답`;
  if(userAns!=='(건너뜀)') html+=` — 입력: <span style="font-family:var(--mono);font-size:12px">${esc(userAns)}</span>`;
  if(type==='write') html+=`<div class="ans">${esc(q.zh)}</div>`;
  if(type==='pinyin'){
    html+=`<div class="pinyin-ans">정답: ${esc(q.pinyin)}</div>`;
    if(diffHtml) html+=`<div class="diff-line">${diffHtml}</div>`;
  }
  if(type==='blank') html+=`<div class="ans">정답: ${esc(q.answer)}</div>`;
  if(type==='order') html+=`<div class="ans">정답 순서: ${esc(q.words.join(' / '))}</div><div class="ans" style="font-size:14px">${esc(q.zh)}</div>`;
  fb.innerHTML=html;
}

function buildDiff(input, correct){
  const ia=input.trim().split(/\s+/);
  const ca=correct.trim().split(/\s+/);
  const max=Math.max(ia.length,ca.length);
  let out='';
  for(let i=0;i<max;i++){
    const iw=ia[i]||'';const cw=ca[i]||'';
    if(i>0) out+=' ';
    // 성조변화 허용해서 비교
    const iwN=normalizePinyin(iw);const cwN=normalizePinyin(cw);
    if(!iw) out+=`<span class="diff-mis">${esc(cw)}</span>`;
    else if(iwN===cwN) out+=`<span class="diff-ok">${esc(cw)}</span>`;
    else out+=`<span class="diff-ng">${esc(iw)}</span>→<span class="diff-ok">${esc(cw)}</span>`;
  }
  return out;
}

function disableInput(){
  const inp=document.getElementById('typeIn');
  if(inp) inp.disabled=true;
}

function showNextBtn(){
  const isLast=curIdx>=queue.length-1;
  document.getElementById('actionRow').innerHTML=
    `<button class="btn btn-ok" onclick="${isLast?'showResult()':'nextQ()'}">${isLast?'결과 보기 →':'▶ 다음 문제'}</button>`;
}

function nextQ(){
  curIdx++;
  if(curIdx>=queue.length){ showResult(); return; }
  renderQ();
}

function updateHUD(){
  document.getElementById('hudQ').textContent=`${curIdx+1}/${queue.length}`;
  document.getElementById('hudScore').textContent=score;
  document.getElementById('progFill').style.width=`${(curIdx/queue.length)*100}%`;
}

function showResult(){
  showScreen('resultScreen');
  const total=queue.length*10;
  const pct=Math.round(score/total*100);
  document.getElementById('rScore').textContent=score;
  document.getElementById('rLabel').textContent=`/ ${total}점`;
  document.getElementById('rCorrect').textContent=queue.length-wrongItems.length;
  document.getElementById('rWrong').textContent=wrongItems.length;
  document.getElementById('rAcc').textContent=pct+'%';

  // localStorage에 기록 저장
  const now=new Date();
  const dateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  saveRecord({
    date:dateStr,
    score,
    total,
    pct,
    correct:queue.length-wrongItems.length,
    wrong:wrongItems.length,
    totalQ:queue.length,
    lessons:[...new Set(queue.map(q=>q.lesson))].sort(),
    level:cfg.level==='easy'?'하':cfg.level==='mid'?'중':'상',
    types:cfg.types,
  });

  let grade='';
  if(pct>=90) grade='🏆 최우수 — 완벽해요!';
  else if(pct>=80) grade='🥇 우수 — 훌륭해요!';
  else if(pct>=70) grade='🥈 양호 — 잘 하고 있어요!';
  else if(pct>=60) grade='📚 보통 — 더 연습이 필요해요.';
  else grade='💪 분발 — 틀린 문제를 다시 복습해요!';
  document.getElementById('rGrade').textContent=grade;

  const ws=document.getElementById('wrongSection');
  if(wrongItems.length===0){
    ws.innerHTML='<div style="text-align:center;padding:20px;color:var(--green);font-weight:700">🎉 틀린 문제가 없어요! 완벽해요!</div>';
    return;
  }
  let html=`<div class="wrong-title">❌ 틀린 문제 (${wrongItems.length}개) — 답 확인 및 복습</div>`;
  wrongItems.forEach((item,i)=>{
    const {q,type,userAns}=item;
    const typeLabel=type==='write'?'유형1·중국어쓰기':type==='pinyin'?'유형3·병음쓰기':type==='order'?'유형4·순서배열':'유형2·빈칸채우기';
    const typeCls=type==='write'?'qb-write':type==='pinyin'?'qb-pinyin':type==='order'?'qb-order':'qb-blank';
    html+=`<div class="wrong-card">
      <span class="wrong-type ${typeCls}">${typeLabel}</span>
      <div class="q-lesson" style="margin-bottom:6px">${q.lesson}</div>`;

    if(type==='write'){
      html+=`<div class="wrong-q">💬 ${esc(q.ko)}</div>
        <div class="wrong-my">내 답: ${esc(userAns)}</div>
        <div class="wrong-ans-zh">정답: ${esc(q.zh)}</div>
        <div class="wrong-ans-py">${esc(q.pinyin)}</div>`;
    } else if(type==='pinyin'){
      html+=`<div class="q-zh" style="font-size:18px;margin-bottom:6px">${esc(q.zh)}</div>
        <div class="wrong-my">내 답: <span style="font-family:var(--mono);font-size:12px">${esc(userAns)}</span></div>
        <div class="wrong-ans-py">정답: ${esc(q.pinyin)}</div>`;
    } else if(type==='order'){
      html+=`<div class="wrong-q">💬 ${esc(q.ko)}</div>
        <div class="wrong-my">내 답: ${esc(userAns)}</div>
        <div class="wrong-ans-zh">${esc(q.zh)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">정답 순서: ${esc(q.words.join(' → '))}</div>`;
    } else {
      html+=`<div class="wrong-q">${esc(q.zh)}</div>
        <div class="wrong-q">💬 ${esc(q.ko)}</div>
        <div class="wrong-my">내 답: ${esc(userAns)}</div>
        <div class="wrong-ans-zh">정답: ${esc(q.answer)}</div>`;
    }
    html+='</div>';
  });
  ws.innerHTML=html;
}

function retryWrong(){
  if(wrongItems.length===0) return;
  queue=wrongItems.map(item=>({...item.q, type:item.type}));
  curIdx=0;score=0;wrongItems=[];
  showScreen('questionScreen');
  renderQ();
}


/* ── 풀었던 문장 추적 ── */
const DONE_KEY='zhonghua_done_sents'; // 풀어본 문장 zh 목록 저장
const WRONG_KEY='zhonghua_wrong_sents'; // 틀린 문장 zh 목록 저장

function getDoneSents(){
  try{ return new Set(JSON.parse(localStorage.getItem(DONE_KEY)||'[]')); }catch(e){ return new Set(); }
}
function getWrongSents(){
  try{ return new Set(JSON.parse(localStorage.getItem(WRONG_KEY)||'[]')); }catch(e){ return new Set(); }
}
function saveDoneSent(zh){
  try{
    const s=getDoneSents(); s.add(zh);
    localStorage.setItem(DONE_KEY,JSON.stringify([...s]));
  }catch(e){}
}
function saveWrongSent(zh){
  try{
    const s=getWrongSents(); s.add(zh);
    localStorage.setItem(WRONG_KEY,JSON.stringify([...s]));
  }catch(e){}
}
function removeDoneSent(zh){ // 틀리면 done에서 제거
  try{
    const s=getDoneSents(); s.delete(zh);
    localStorage.setItem(DONE_KEY,JSON.stringify([...s]));
  }catch(e){}
}

/* ── 범위 선택 ── */
function selectRange(range, el){
  cfg.range=range;
  document.querySelectorAll('#rangeAll,#rangeNew,#rangeWrong').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');

  const done=getDoneSents();
  const wrong=getWrongSents();
  const info=document.getElementById('rangeInfo');
  if(range==='all'){
    info.textContent='';
  } else if(range==='new'){
    info.textContent=`📊 지금까지 풀어본 문장: ${done.size}개 · 안 해본 문장: ${ALL.length+BLANKS.length-done.size}개 이상`;
  } else {
    info.textContent=`📊 틀린 문장: ${wrong.size}개`;
  }
}

/* ── 단원 선택 ── */
function toggleLesson(lesson, el){
  if(lesson==='all'){
    // 전체 토글
    const allOn=el.classList.contains('all-on');
    if(allOn){
      // 전체 해제
      document.querySelectorAll('.lchip[data-lesson]').forEach(b=>b.classList.remove('on','all-on'));
      cfg.lessons=[];
    } else {
      // 전체 선택
      document.querySelectorAll('.lchip[data-lesson]').forEach(b=>b.classList.add('on'));
      el.classList.add('all-on');
      cfg.lessons=['1과','2과','3과','4과','5과','6과','7과','부록'];
    }
  } else {
    el.classList.toggle('on');
    const allBtn=document.querySelector('.lchip[data-lesson="all"]');
    const selected=[...document.querySelectorAll('.lchip[data-lesson]:not([data-lesson="all"])')].filter(b=>b.classList.contains('on')).map(b=>b.dataset.lesson);
    cfg.lessons=selected;
    if(selected.length===7){ allBtn.classList.add('all-on','on'); }
    else allBtn.classList.remove('all-on','on');
  }
  document.getElementById('startBtn').disabled=cfg.types.length===0||cfg.lessons.length===0;
}

function confirmBack(){
  if(confirm('시험을 그만하고 처음으로 돌아갈까요?\n현재까지의 기록은 저장되지 않아요.')) {

  document.getElementById('mainTabs').style.display='flex';

/* ── localStorage 기록 ── */
const REC_KEY='zhonghua_records';

function saveRecord(data){
  let recs=loadRecords();
  recs.unshift(data); // 최신순
  if(recs.length>50) recs=recs.slice(0,50); // 최대 50개
  try{ localStorage.setItem(REC_KEY, JSON.stringify(recs)); }catch(e){}
}

function loadRecords(){
  try{
    const d=localStorage.getItem(REC_KEY);
    return d?JSON.parse(d):[];
  }catch(e){ return []; }
}

function clearRecords(){
  if(!confirm('시험 기록과 학습 현황을 모두 삭제할까요?')) return;
  localStorage.removeItem(REC_KEY);
  localStorage.removeItem(DONE_KEY);
  localStorage.removeItem(WRONG_KEY);
  renderRecords();
}

function renderRangeStats(){
  // 시작화면 범위 선택 시 통계 갱신
  const done=getDoneSents();
  const wrong=getWrongSents();
  const total=ALL.length+BLANKS.length;
  const newCount=Math.max(0,total-done.size);
  const info=document.getElementById('rangeInfo');
  if(info&&cfg.range==='new') info.textContent=`📊 지금까지 풀어본 문장: ${done.size}개 · 안 해본 문장: ${newCount}개 이상`;
  if(info&&cfg.range==='wrong') info.textContent=`📊 틀린 문장: ${wrong.size}개`;
}

function renderRecords(){

  // 학습 현황 항상 표시
  const done=getDoneSents();
  const wrong=getWrongSents();
  const totalSents=ALL.length+BLANKS.length;
  const pct=totalSents>0?Math.round(done.size/totalSents*100):0;
  bestEl.innerHTML=`
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px">📚 학습 진행 현황</div>
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <div class="rb-item"><div class="rb-n" style="color:var(--green)">${done.size}</div><div class="rb-l">풀어본 문장</div></div>
        <div class="rb-item"><div class="rb-n" style="color:var(--accent)">${totalSents-done.size}</div><div class="rb-l">안 해본 문장</div></div>
        <div class="rb-item"><div class="rb-n" style="color:var(--red)">${wrong.size}</div><div class="rb-l">틀린 문장</div></div>
        <div class="rb-item"><div class="rb-n" style="color:var(--gold)">${pct}%</div><div class="rb-l">학습 완료율</div></div>
      </div>
      <div style="height:6px;background:var(--border);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--green),var(--accent));border-radius:4px;transition:width .5s"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:5px;text-align:right">${done.size} / ${totalSents} 문장</div>
    </div>`;

  if(recs.length===0){
    listEl.innerHTML=`<div class="rec-empty"><div class="rei">📭</div><p>아직 시험 기록이 없어요.<br>시험을 먼저 풀어봐요!</p></div>`;
    return;
  }

  // 최고기록 계산
  const pcts=recs.map(r=>r.pct);
  const bestPct=Math.max(...pcts);
  const avgPct=Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length);
  const totalTries=recs.length;
  bestEl.innerHTML=`
    <div class="rb-item"><div class="rb-n">${bestPct}%</div><div class="rb-l">최고 정확도</div></div>
    <div class="rb-item"><div class="rb-n">${avgPct}%</div><div class="rb-l">평균 정확도</div></div>
    <div class="rb-item"><div class="rb-n">${totalTries}</div><div class="rb-l">총 시험 횟수</div></div>`;

  let html='<div class="rec-grid">';
  recs.forEach(r=>{
    const col=r.pct>=80?'var(--green)':r.pct>=60?'var(--gold)':'var(--red)';
    html+=`<div class="rec-card">
      <div class="rec-date">${r.date}</div>
      <div class="rec-score" style="color:${col}">${r.score}</div>
      <div class="rec-total">/ ${r.total}점</div>
      <div class="rec-pct" style="color:${col}">${r.pct}% 정확도</div>
      <div class="rec-tags">
        ${r.lessons.map(l=>`<span class="rec-tag">${l}</span>`).join('')}
        <span class="rec-tag" style="background:var(--gold-l);color:var(--gold)">${r.level}</span>
        ${r.types.map(t=>`<span class="rec-tag" style="background:#f0f0f0;color:#666">${t==='write'?'유형1':t==='blank'?'유형2':t==='pinyin'?'유형3':'유형4'}</span>`).join('')}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">
        정답 ${r.correct} / ${r.totalQ}문제 · 오답 ${r.wrong}문제
      </div>
    </div>`;
  });
  html+='</div>';
  listEl.innerHTML=html;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
