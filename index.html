<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중회화 중간고사 대비</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f6f2;--card:#fff;--border:#e0ddd4;--text:#1a1a18;--muted:#6b6b66;
  --accent:#2e5fa3;--accent-l:#e8eef8;--red:#c0392b;--red-l:#fdf0ee;
  --green:#1e7e4a;--green-l:#eaf5ee;--gold:#8a6400;--gold-l:#fdf5df;
  --zh-font:'Songti SC','STSong','SimSun','宋体',serif;--mono:'Courier New','Consolas','Menlo',monospace;
}
body{font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic','나눔고딕','NanumGothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.header-title{font-size:16px;font-weight:700;color:var(--text)}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px}
.hud{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.hud-item{text-align:center}
.hud-n{font-size:20px;font-weight:700;color:var(--accent)}
.hud-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.prog-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;width:160px}
.prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}

/* ── SCREENS ── */
.screen{display:none;max-width:800px;margin:0 auto;padding:24px 20px}
.screen.active{display:block}

/* ── START SCREEN ── */
.start-hero{text-align:center;padding:40px 0 24px}
.start-hero h1{font-size:26px;font-weight:700;margin-bottom:8px}
.start-hero p{color:var(--muted);font-size:14px;line-height:1.7}
.config-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:24px 0}
.config-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:20px 16px;cursor:pointer;transition:all .2s;text-align:center}
.config-card.selected{border-color:var(--accent);background:var(--accent-l)}
.config-card h3{font-size:13px;font-weight:700;margin-bottom:6px}
.config-card p{font-size:12px;color:var(--muted);line-height:1.5}
.config-card .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-bottom:8px;font-weight:700}
.badge-easy{background:#eaf5ee;color:#1e7e4a}
.badge-mid{background:#fdf5df;color:#8a6400}
.badge-hard{background:#fdf0ee;color:#c0392b}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
.type-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:14px 12px;cursor:pointer;text-align:center;transition:all .2s;font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic','나눔고딕','NanumGothic',sans-serif}
.type-btn.selected{border-color:var(--accent);background:var(--accent-l)}
.type-btn .ti{font-size:22px;margin-bottom:6px}
.type-btn span{font-size:12px;font-weight:500;display:block}
.start-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic','나눔고딕','NanumGothic',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:background .2s}
.start-btn:hover{background:#1e4a8a}
.start-btn:disabled{background:#bbb;cursor:default}
.section-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}

/* ── QUESTION SCREEN ── */
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.q-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.qb-write{background:#e8eef8;color:#2e5fa3}
.qb-blank{background:#fdf5df;color:#8a6400}
.qb-pinyin{background:#eaf5ee;color:#1e7e4a}
.q-num{font-size:12px;color:var(--muted)}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:18px}
.q-lesson{font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:.3px}
.q-zh{font-family:var(--zh-font);font-size:24px;line-height:1.6;margin-bottom:8px;color:var(--text)}
.q-ko{font-size:14px;color:var(--muted);line-height:1.7}
.q-blank-sentence{font-family:var(--zh-font);font-size:20px;line-height:1.8;margin-bottom:12px}
.blank-slot{display:inline-block;border-bottom:2px solid var(--accent);min-width:80px;text-align:center;color:var(--accent);font-weight:700;margin:0 4px;padding:0 6px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.choice-btn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:12px 16px;font-family:var(--zh-font);font-size:16px;cursor:pointer;text-align:left;transition:all .18s;font-weight:400}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-l)}
.choice-btn.correct{background:var(--green-l);border-color:var(--green);color:var(--green)}
.choice-btn.wrong{background:var(--red-l);border-color:var(--red);color:var(--red)}
.choice-btn:disabled{cursor:default}
.q-hint{font-size:12px;color:var(--muted);margin-bottom:8px}

/* typing input */
.typing-wrap{margin-top:4px}
.typing-tip{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.6;padding:8px 12px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.typing-tip b{color:var(--accent)}
.type-input{width:100%;padding:12px 14px;font-family:var(--mono);font-size:14px;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);outline:none;transition:border-color .2s;letter-spacing:.2px}
.type-input:focus{border-color:var(--accent)}
.type-input.ok{border-color:var(--green);background:var(--green-l)}
.type-input.ng{border-color:var(--red);background:var(--red-l);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.wordcount{font-size:11px;color:var(--muted);margin-top:5px;height:14px}
.diff-line{font-family:var(--mono);font-size:12px;margin-top:6px;padding:6px 10px;background:var(--bg);border-radius:6px;line-height:1.8}
.diff-ok{color:var(--green)}
.diff-ng{color:var(--red);text-decoration:underline wavy var(--red)}
.diff-mis{color:var(--muted);text-decoration:underline}

/* feedback */
.fb{padding:12px 16px;border-radius:10px;font-size:14px;margin-top:12px;display:none;line-height:1.7}
.fb.show{display:block}
.fb.ok{background:var(--green-l);border:1px solid #a8d5b8;color:var(--green)}
.fb.ng{background:var(--red-l);border:1px solid #f0b8b4;color:var(--red)}
.fb .ans{font-family:var(--zh-font);font-size:16px;margin-top:4px;color:var(--text)}
.fb .pinyin-ans{font-family:var(--mono);font-size:13px;margin-top:4px;color:var(--accent)}

/* action row */
.action-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:8px;font-family:'Apple SD Gothic Neo','맑은 고딕','Malgun Gothic','나눔고딕','NanumGothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-p{background:var(--accent);color:#fff}
.btn-p:hover{background:#1e4a8a}
.btn-g{background:var(--card);border:1.5px solid var(--border);color:var(--muted)}
.btn-g:hover{border-color:var(--accent);color:var(--accent)}
.btn-ok{background:var(--green);color:#fff}
.btn-ok:hover{background:#155e36}
.btn-sm{padding:7px 14px;font-size:12px}

/* ── RESULT SCREEN ── */
.result-hero{text-align:center;padding:32px 0 20px}
.result-score{font-size:56px;font-weight:700;color:var(--accent);line-height:1}
.result-label{font-size:14px;color:var(--muted);margin-top:6px}
.result-grade{font-size:18px;font-weight:700;margin-top:10px}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.rs-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.rs-n{font-size:24px;font-weight:700}
.rs-l{font-size:11px;color:var(--muted);margin-top:3px}
.wrong-section{margin-top:24px}
.wrong-title{font-size:14px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.wrong-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
.wrong-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:8px}
.wrong-q{font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.6}
.wrong-my{font-size:13px;color:var(--red);margin-bottom:4px}
.wrong-ans-zh{font-family:var(--zh-font);font-size:18px;color:var(--text);margin-bottom:2px}
.wrong-ans-py{font-family:var(--mono);font-size:12px;color:var(--accent)}
.retry-row{display:flex;gap:10px;margin-top:20px;justify-content:center;flex-wrap:wrap}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

@media(max-width:600px){
  .config-grid{grid-template-columns:1fr}
  .type-grid{grid-template-columns:1fr}
  .choices{grid-template-columns:1fr}
  .result-stats{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="mainHeader">
  <div>
    <div class="header-title">중회화 중간고사 대비</div>
    <div class="header-sub" id="headerSub">1과 ~ 7과 전체 범위</div>
  </div>
  <div class="hud" id="hudArea" style="display:none">
    <div class="hud-item"><div class="hud-n" id="hudQ">0/0</div><div class="hud-l">문제</div></div>
    <div class="hud-item"><div class="hud-n" id="hudScore">0</div><div class="hud-l">점수</div></div>
    <div class="hud-item">
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="hud-l" style="margin-top:4px">진행률</div>
    </div>
  </div>
</div>

<!-- START SCREEN -->
<div class="screen active" id="startScreen">
  <div class="start-hero">
    <h1>중간고사 대비 시험</h1>
    <p>1과~7과 전체 문장 수록 · 세 가지 유형 · 난이도 선택<br>틀린 문제는 마지막에 모아서 복습할 수 있어요</p>
  </div>

  <div class="section-label">유형 선택 (복수 선택 가능)</div>
  <div class="type-grid">
    <button class="type-btn selected" data-type="write" onclick="toggleType('write',this)">
      <div class="ti">✍️</div>
      <span>유형 1</span>
      <span style="color:var(--muted);font-size:11px">한글 뜻 보고 중국어 쓰기</span>
    </button>
    <button class="type-btn selected" data-type="blank" onclick="toggleType('blank',this)">
      <div class="ti">📝</div>
      <span>유형 2</span>
      <span style="color:var(--muted);font-size:11px">문맥에 맞는 단어 빈칸 넣기</span>
    </button>
    <button class="type-btn selected" data-type="pinyin" onclick="toggleType('pinyin',this)">
      <div class="ti">🔤</div>
      <span>유형 3</span>
      <span style="color:var(--muted);font-size:11px">중국어 듣고 병음 쓰기</span>
    </button>
  </div>

  <div class="section-label" style="margin-top:20px">난이도 선택</div>
  <div class="config-grid">
    <div class="config-card selected" data-level="easy" onclick="selectLevel('easy',this)">
      <div class="badge badge-easy">하</div>
      <h3>초급</h3>
      <p>짧은 문장 위주<br>기본 어휘 · 힌트 있음</p>
    </div>
    <div class="config-card" data-level="mid" onclick="selectLevel('mid',this)">
      <div class="badge badge-mid">중</div>
      <h3>중급</h3>
      <p>중간 길이 문장<br>힌트 없음</p>
    </div>
    <div class="config-card" data-level="hard" onclick="selectLevel('hard',this)">
      <div class="badge badge-hard">상</div>
      <h3>고급</h3>
      <p>긴 문장 · 복잡한 구조<br>병음 대소문자 · 띄어쓰기 엄격</p>
    </div>
  </div>

  <div class="section-label" style="margin-top:20px">문제 수</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="type-btn selected" data-count="20" onclick="selectCount(20,this)" style="padding:10px 16px;flex:1;min-width:80px"><span>20문제</span></button>
    <button class="type-btn" data-count="40" onclick="selectCount(40,this)" style="padding:10px 16px;flex:1;min-width:80px"><span>40문제</span></button>
    <button class="type-btn" data-count="60" onclick="selectCount(60,this)" style="padding:10px 16px;flex:1;min-width:80px"><span>60문제</span></button>
    <button class="type-btn" data-count="999" onclick="selectCount(999,this)" style="padding:10px 16px;flex:1;min-width:80px"><span>전체</span></button>
  </div>

  <button class="start-btn" id="startBtn" onclick="startExam()">시험 시작하기 →</button>
</div>

<!-- QUESTION SCREEN -->
<div class="screen" id="questionScreen">
  <div class="q-meta">
    <span class="q-badge" id="qBadge"></span>
    <span class="q-num" id="qNum"></span>
    <span class="q-num" id="qLesson" style="margin-left:auto"></span>
  </div>
  <div class="q-card" id="qCard"></div>
  <div class="fb" id="fb"></div>
  <div class="action-row" id="actionRow"></div>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="resultScreen">
  <div class="result-hero">
    <div class="result-score" id="rScore">0</div>
    <div class="result-label" id="rLabel">/ 0점</div>
    <div class="result-grade" id="rGrade"></div>
  </div>
  <div class="result-stats">
    <div class="rs-item"><div class="rs-n" id="rCorrect" style="color:var(--green)">0</div><div class="rs-l">정답</div></div>
    <div class="rs-item"><div class="rs-n" id="rWrong" style="color:var(--red)">0</div><div class="rs-l">오답</div></div>
    <div class="rs-item"><div class="rs-n" id="rAcc" style="color:var(--accent)">0%</div><div class="rs-l">정확도</div></div>
  </div>
  <div class="wrong-section" id="wrongSection"></div>
  <div class="retry-row">
    <button class="btn btn-p" onclick="showScreen('startScreen')">↩ 처음으로</button>
    <button class="btn btn-g" onclick="retryWrong()">틀린 문제만 다시풀기</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DATA — 1과~7과 전체 문장
   format: { zh, ko, pinyin, lesson, level }
   level: 1=하, 2=중, 3=상
═══════════════════════════════════════════════════ */
const ALL = [
// ── 1과 ──
{zh:"大家互相认识一下儿吧。",ko:"서로 인사를 나눠봐요.",pinyin:"Dàjiā hùxiāng rènshi yīxiàr ba.",lesson:"1과",level:1},
{zh:"对不起，你的名字有点儿难记。",ko:"죄송해요, 당신의 이름은 외우기가 조금 어렵네요.",pinyin:"Duìbuqǐ, nǐ de míngzi yǒudiǎnr nán jì.",lesson:"1과",level:1},
{zh:"请您多多关照。",ko:"많이 돌봐 주세요.",pinyin:"Qǐng nín duōduō guānzhào.",lesson:"1과",level:1},
{zh:"你们俩的名字都挺好听。",ko:"두 분의 이름이 모두 듣기 좋네요.",pinyin:"Nǐmen liǎ de míngzi dōu tǐng hǎotīng.",lesson:"1과",level:1},
{zh:"我是华裔，从美国来。",ko:"저는 화교이고, 미국에서 왔어요.",pinyin:"Wǒ shì Huáyì, cóng Měiguó lái.",lesson:"1과",level:1},
{zh:"我会说点儿广东话，不过，我想学普通话。",ko:"광둥어를 조금 할 줄 알지만, 보통화를 배우고 싶어요.",pinyin:"Wǒ huì shuō diǎnr Guǎngdōnghuà, búguò, wǒ xiǎng xué Pǔtōnghuà.",lesson:"1과",level:2},
{zh:"别担心，咱们班同学可好了，老师也像朋友一样。",ko:"걱정하지 마요, 우리 반 학생들은 정말 좋고, 선생님도 친구 같아요.",pinyin:"Bié dānxīn, zánmen bān tóngxué kě hǎo le, lǎoshī yě xiàng péngyou yīyàng.",lesson:"1과",level:2},
{zh:"快把行李放下，我以为你回来得比我早呢。",ko:"짐을 내려놓아요, 당신이 나보다 일찍 돌아올 줄 알았어요.",pinyin:"Kuài bǎ xíngli fàng xia, wǒ yǐwéi nǐ huílái de bǐ wǒ zǎo ne.",lesson:"1과",level:2},
{zh:"你好像比以前瘦了，也黑了，不过更精神了。",ko:"예전보다 살이 빠지고 피부도 탔지만, 더 생기있어 보여요.",pinyin:"Nǐ hǎoxiàng bǐ yǐqián shòu le, yě hēi le, búguò gèng jīngshén le.",lesson:"1과",level:2},
{zh:"这是我家乡的特产，是我爸爸妈妈给你的。",ko:"이건 우리 고향의 특산물이에요, 우리 부모님이 당신에게 드리는 거예요.",pinyin:"Zhè shì wǒ jiāxiāng de tèchǎn, shì wǒ bàba māma gěi nǐ de.",lesson:"1과",level:2},
{zh:"昨天我碰见杰夫了。他说，你回来以后，大家聚聚。",ko:"어제 제프를 우연히 만났어요. 그는 당신이 돌아오면 다들 모이자고 했어요.",pinyin:"Zuótiān wǒ pèngjiàn Jiéfū le. Tā shuō, nǐ huílái yǐhòu, dàjiā jùjù.",lesson:"1과",level:3},
{zh:"你一定想不到，我去当英语老师了。",ko:"당신은 분명 상상도 못 했겠지만, 저는 영어 선생님을 하러 갔어요.",pinyin:"Nǐ yīdìng xiǎng bu dào, wǒ qù dāng Yīngyǔ lǎoshī le.",lesson:"1과",level:2},
{zh:"不信吧？学生们挺喜欢我的。",ko:"못 믿겠죠? 학생들이 저를 꽤 좋아해요.",pinyin:"Bù xìn ba? Xuéshengmen tǐng xǐhuan wǒ de.",lesson:"1과",level:1},
{zh:"你老说他是个有意思的人，快给我介绍介绍吧。",ko:"당신은 항상 그가 재미있는 사람이라고 하던데, 빨리 소개시켜줘요.",pinyin:"Nǐ lǎo shuō tā shì ge yǒuyìsi de rén, kuài gěi wǒ jièshào jièshào ba.",lesson:"1과",level:3},
// ── 2과 ──
{zh:"对不起，您家的电视能不能小点儿声？",ko:"죄송해요, 댁의 TV 소리를 좀 줄여줄 수 있나요?",pinyin:"Duìbuqǐ, nín jiā de diànshì néng bu néng xiǎo diǎnr shēng?",lesson:"2과",level:1},
{zh:"实在抱歉，我一看球就大喊大叫。",ko:"정말 죄송해요, 저는 축구를 보면 큰 소리로 외쳐요.",pinyin:"Shízài bàoqiàn, wǒ yī kàn qiú jiù dà hǎn dà jiào.",lesson:"2과",level:2},
{zh:"我是国际足球队的队长，队员们都棒极了。",ko:"저는 국제 축구팀의 주장이고, 팀원들이 모두 정말 훌륭해요.",pinyin:"Wǒ shì guójì zúqiúduì de duìzhǎng, duìyuánmen dōu bàng jí le.",lesson:"2과",level:2},
{zh:"一般每两周进行一次比赛，大家都很认真。",ko:"보통 2주마다 한 번씩 경기를 해요, 모두 매우 성실해요.",pinyin:"Yībān měi liǎng zhōu jìnxíng yī cì bǐsài, dàjiā dōu hěn rènzhēn.",lesson:"2과",level:2},
{zh:"有了她们的热情支持，比赛的时候，我们更有精神了。",ko:"그들의 열정적인 응원 덕분에 경기할 때 더 힘이 났어요.",pinyin:"Yǒu le tāmen de rèqíng zhīchí, bǐsài de shíhou, wǒmen gèng yǒu jīngshén le.",lesson:"2과",level:3},
{zh:"这时候，我听见了拉拉队员们的加油声'国际队一定赢！'",ko:"이때 응원단의 '국제팀 반드시 이겨라!'라는 응원 소리를 들었어요.",pinyin:"Zhè shíhou, wǒ tīngjiàn le lālāduìyuánmen de jiāyóu shēng 'Guójìduì yīdìng yíng!'",lesson:"2과",level:3},
{zh:"大家又是握手又是拥抱，高兴极了。",ko:"모두가 악수하고 포옹하며, 매우 기뻐했어요.",pinyin:"Dàjiā yòu shì wòshǒu yòu shì yǒngbào, gāoxìng jí le.",lesson:"2과",level:2},
{zh:"谁输谁赢还不一定呢。",ko:"누가 지고 누가 이길지 아직 모르죠.",pinyin:"Shéi shū shéi yíng hái bù yīdìng ne.",lesson:"2과",level:1},
// ── 3과 ──
{zh:"您坐反了，动物园在南边，这车是往北边开的。",ko:"반대 방향으로 타셨어요, 동물원은 남쪽이고 이 차는 북쪽으로 가요.",pinyin:"Nín zuò fǎn le, dòngwùyuán zài nánbiān, zhè chē shì wǎng běibiān kāi de.",lesson:"3과",level:2},
{zh:"不行，不到站不准停车。",ko:"안 돼요, 정류장이 아니면 차를 세울 수 없어요.",pinyin:"Bù xíng, bù dào zhàn bù zhǔn tíng chē.",lesson:"3과",level:1},
{zh:"对不起，不是我不想帮您，马路上不能随便停车。",ko:"죄송해요, 도와드리기 싫은 게 아니라, 도로에서 마음대로 차를 세울 수 없어요.",pinyin:"Duìbuqǐ, bú shì wǒ bù xiǎng bāng nín, mǎlù shàng bù néng suíbiàn tíng chē.",lesson:"3과",level:2},
{zh:"今天真倒霉，被罚了。",ko:"오늘 정말 재수가 없어요, 벌금을 물었어요.",pinyin:"Jīntiān zhēn dǎoméi, bèi fá le.",lesson:"3과",level:1},
{zh:"不小心闯红灯了。",ko:"실수로 빨간 신호를 위반했어요.",pinyin:"Bù xiǎoxīn chuǎng hóngdēng le.",lesson:"3과",level:1},
{zh:"以后，我一定要注意遵守交通规则，好让你们放心。",ko:"앞으로 반드시 교통규칙을 지키는 데 주의하겠습니다, 여러분이 안심할 수 있도록요.",pinyin:"Yǐhòu, wǒ yīdìng yào zhùyì zūnshǒu jiāotōng guīzé, hǎo ràng nǐmen fàngxīn.",lesson:"3과",level:3},
{zh:"这儿的路本来就不宽，自行车放在这儿，多影响交通啊！",ko:"여기 도로가 원래 넓지 않은데, 자전거를 여기 두면 교통에 방해가 얼마나 되겠어요!",pinyin:"Zhèr de lù běnlái jiù bù kuān, zìxíngchē fàng zài zhèr, duō yǐngxiǎng jiāotōng a!",lesson:"3과",level:3},
{zh:"请司机师傅们一定要注意交通安全，不要酒后开车，更不要闯红灯，那太危险了。",ko:"운전기사 여러분은 반드시 교통안전에 주의하고, 음주운전하지 말고, 빨간 신호도 위반하지 마세요, 너무 위험해요.",pinyin:"Qǐng sījī shīfu men yīdìng yào zhùyì jiāotōng ānquán, bú yào jiǔhòu kāichē, gèng bú yào chuǎng hóngdēng, nà tài wēixiǎn le.",lesson:"3과",level:3},
// ── 4과 ──
{zh:"我从小就不爱吃鱼。",ko:"저는 어릴 때부터 생선을 좋아하지 않아요.",pinyin:"Wǒ cóngxiǎo jiù bù ài chī yú.",lesson:"4과",level:1},
{zh:"不论怎么做，我都不爱吃。",ko:"어떻게 요리해도 저는 다 싫어요.",pinyin:"Bùlùn zěnme zuò, wǒ dōu bù ài chī.",lesson:"4과",level:1},
{zh:"鱼的营养丰富，都说吃鱼能让人聪明。",ko:"생선은 영양이 풍부하고, 생선을 먹으면 머리가 좋아진다고 다들 말해요.",pinyin:"Yú de yíngyǎng fēngfù, dōu shuō chī yú néng ràng rén cōngming.",lesson:"4과",level:2},
{zh:"哪天你没时间去食堂排队的话，也可以叫个外卖，又快又方便。",ko:"언제든지 식당에 줄 서러 갈 시간이 없으면 배달 음식을 시킬 수 있어요, 빠르고 편리해요.",pinyin:"Nǎtiān nǐ méi shíjiān qù shítáng páiduì dehuà, yě kěyǐ jiào ge wàimài, yòu kuài yòu fāngbiàn.",lesson:"4과",level:3},
{zh:"粽子煮好了，大家都来尝尝吧！",ko:"쫑즈가 다 익었어요, 다들 와서 맛봐요!",pinyin:"Zòngzi zhǔ hǎo le, dàjiā dōu lái chángchang ba!",lesson:"4과",level:1},
{zh:"中国的民族多，历史长，传统节日，民族节日是不是也多？",ko:"중국은 민족이 많고 역사가 길어서, 전통 명절과 민족 명절도 많지 않나요?",pinyin:"Zhōngguó de mínzú duō, lìshǐ cháng, chuántǒng jiérì, mínzú jiérì shì bu shì yě duō?",lesson:"4과",level:3},
{zh:"端午节，翻译成英文叫龙船节。",ko:"단오절은 영어로 번역하면 드래곤보트 페스티벌이라고 해요.",pinyin:"Duānwǔjié, fānyì chéng Yīngwén jiào Lóngchuán jié.",lesson:"4과",level:2},
{zh:"有的地方还举行划龙船比赛，挺有意思的。",ko:"어떤 곳에서는 용선 경기도 열어요, 꽤 재미있어요.",pinyin:"Yǒude dìfang hái jǔxíng huá lóngchuán bǐsài, tǐng yǒuyìsi de.",lesson:"4과",level:2},
// ── 5과 ──
{zh:"对不起，我来晚了。等急了吧？",ko:"죄송해요, 늦었어요. 많이 기다렸죠?",pinyin:"Duìbuqǐ, wǒ lái wǎn le. Děng jí le ba?",lesson:"5과",level:1},
{zh:"你怎么又迟到了？",ko:"또 지각했어요?",pinyin:"Nǐ zěnme yòu chídào le?",lesson:"5과",level:1},
{zh:"快要下班的时候，老板让我复印几份东西，我用最快的速度复印完了。",ko:"퇴근할 즈음에 사장님이 뭔가를 복사하라고 해서 최대한 빨리 복사를 마쳤어요.",pinyin:"Kuàiyào xiàbān de shíhou, lǎobǎn ràng wǒ fùyìn jǐ fèn dōngxi, wǒ yòng zuì kuài de sùdù fùyìn wán le.",lesson:"5과",level:3},
{zh:"出来时，发现自行车没气了。",ko:"나왔더니 자전거 바람이 빠진 걸 발견했어요.",pinyin:"Chūlái shí, fāxiàn zìxíngchē méi qì le.",lesson:"5과",level:2},
{zh:"你总是有那么多理由。",ko:"당신은 항상 그렇게 이유가 많아요.",pinyin:"Nǐ zǒngshì yǒu nàme duō lǐyóu.",lesson:"5과",level:1},
{zh:"好了，别生气了，原谅我吧。",ko:"됐어요, 화내지 말고 용서해줘요.",pinyin:"Hǎo le, bié shēngqì le, yuánliàng wǒ ba.",lesson:"5과",level:1},
{zh:"每次约会你都迟到，下回谁还相信你呀？",ko:"매번 약속에 늦으면 다음에 누가 당신을 믿겠어요?",pinyin:"Měi cì yuēhuì nǐ dōu chídào, xià huí shéi hái xiāngxìn nǐ ya?",lesson:"5과",level:2},
{zh:"你以为我有的是时间等你呀？",ko:"당신을 기다릴 시간이 얼마든지 있는 줄 아세요?",pinyin:"Nǐ yǐwéi wǒ yǒude shì shíjiān děng nǐ ya?",lesson:"5과",level:2},
{zh:"睡不着。愿意陪我聊聊吗？",ko:"잠이 안 와요. 저와 이야기를 나눠줄 의향이 있나요?",pinyin:"Shuì bu zháo. Yuànyì péi wǒ liáoliao ma?",lesson:"5과",level:1},
{zh:"当然。我猜你一定有心事了。",ko:"물론이죠. 당신에게 걱정거리가 있는 것 같아요.",pinyin:"Dāngrán. Wǒ cāi nǐ yīdìng yǒu xīnshì le.",lesson:"5과",level:1},
{zh:"我们俩不是一个国家的人，文化背景，生活习惯都不一样，我妈妈一定不同意我的选择。",ko:"우리 둘은 같은 나라 사람이 아니어서 문화 배경과 생활 습관이 모두 다르고, 우리 엄마는 반드시 제 선택에 동의하지 않을 거예요.",pinyin:"Wǒmen liǎ bú shì yī ge guójiā de rén, wénhuà bèijǐng, shēnghuó xíguàn dōu bù yīyàng, wǒ māma yīdìng bù tóngyì wǒ de xuǎnzé.",lesson:"5과",level:3},
{zh:"重要的是你们俩真心相爱。",ko:"중요한 것은 두 사람이 진심으로 사랑하는 거예요.",pinyin:"Zhòngyào de shì nǐmen liǎ zhēnxīn xiāng'ài.",lesson:"5과",level:2},
{zh:"正因为是妈妈，她才更希望你快乐幸福。",ko:"바로 엄마이기 때문에, 더욱 당신이 즐겁고 행복하기를 바라는 거예요.",pinyin:"Zhèng yīnwéi shì māma, tā cái gèng xīwàng nǐ kuàilè xìngfú.",lesson:"5과",level:3},
{zh:"今年暑假我一定带他去见见我妈。",ko:"올 여름방학에 꼭 그를 데리고 엄마를 만나러 갈 거예요.",pinyin:"Jīnnián shǔjià wǒ yīdìng dài tā qù jiànjiàn wǒ mā.",lesson:"5과",level:2},
// ── 6과 ──
{zh:"我发现中国的老人挺爱跳舞的。",ko:"중국의 노인들은 춤추기를 꽤 좋아한다는 것을 발견했어요.",pinyin:"Wǒ fāxiàn Zhōngguó de lǎorén tǐng ài tiàowǔ de.",lesson:"6과",level:1},
{zh:"每天不论早上还是傍晚，在公园里，总能看见跳舞的老人。",ko:"매일 아침이든 저녁이든 공원에서 춤추는 노인들을 항상 볼 수 있어요.",pinyin:"Měitiān bùlùn zǎoshang háishi bàngwǎn, zài gōngyuán lǐ, zǒng néng kànjiàn tiàowǔ de lǎorén.",lesson:"6과",level:3},
{zh:"爱动不爱动都不重要，重要的是心不能老，心一老比什么都可怕。",ko:"활동적이든 아니든 중요하지 않아요, 중요한 건 마음이 늙으면 안 돼요, 마음이 늙으면 무엇보다 무서워요.",pinyin:"Ài dòng bù ài dòng dōu bù zhòngyào, zhòngyào de shì xīn bù néng lǎo, xīn yī lǎo bǐ shénme dōu kěpà.",lesson:"6과",level:3},
{zh:"有的老人不愿意去，他们觉得在哪儿也不如在家好。",ko:"어떤 노인들은 가기를 원하지 않아요, 어디서든 집만큼 좋지 않다고 생각하거든요.",pinyin:"Yǒude lǎorén bù yuànyì qù, tāmen juéde zài nǎr yě bùrú zài jiā hǎo.",lesson:"6과",level:2},
{zh:"他们的儿女怎么不多为父母想想，他们不希望父母幸福吗？",ko:"그들의 자녀들은 왜 부모를 위해 더 생각하지 않나요, 부모가 행복하기를 바라지 않나요?",pinyin:"Tāmen de érnǚ zěnme bù duō wèi fùmǔ xiǎngxiang, tāmen bù xīwàng fùmǔ xìngfú ma?",lesson:"6과",level:3},
{zh:"老人也有再婚的自由，您别怕这怕那的。",ko:"노인도 재혼의 자유가 있어요, 이것저것 두려워하지 마세요.",pinyin:"Lǎorén yě yǒu zàihūn de zìyóu, nín bié pà zhè pà nà de.",lesson:"6과",level:2},
{zh:"您自己感觉幸福就够了，不要管别人怎么看。",ko:"당신 스스로 행복하다고 느끼면 충분해요, 다른 사람이 어떻게 보는지 신경 쓰지 마세요.",pinyin:"Nín zìjǐ gǎnjué xìngfú jiù gòu le, bú yào guǎn biérén zěnme kàn.",lesson:"6과",level:2},
{zh:"我真心希望您过得幸福，快乐！",ko:"진심으로 당신이 행복하고 즐겁게 지내시기를 바라요!",pinyin:"Wǒ zhēnxīn xīwàng nín guò de xìngfú, kuàilè!",lesson:"6과",level:1},
{zh:"可是儿的爱代替不了丈夫的爱呀。",ko:"하지만 아이의 사랑은 남편의 사랑을 대신할 수 없어요.",pinyin:"Kěshì ér de ài dàitì bu liǎo zhàngfu de ài ya.",lesson:"6과",level:2},
// ── 7과 ──
{zh:"周末怎么过？",ko:"주말에 어떻게 보내세요?",pinyin:"Zhōumò zěnme guò?",lesson:"7과",level:1},
{zh:"大家在一起热闹。做做饭，看看电视，收拾收拾房间，饭桌上一起聊聊天儿。",ko:"다들 함께 모이면 시끌벅적해요. 밥도 하고, TV도 보고, 방도 청소하고, 밥상에서 같이 이야기해요.",pinyin:"Dàjiā zài yīqǐ rènao. Zuòzuo fàn, kànkan diànshì, shōushi shōushi fángjiān, fànzhuō shàng yīqǐ liáoliao tiānr.",lesson:"7과",level:3},
{zh:"我爸我妈不爱活动，还说出去玩儿是乱花钱，他们看不惯。",ko:"우리 부모님은 활동을 좋아하지 않으시고, 나가서 노는 건 돈 낭비라고 하시며 보기 싫어하세요.",pinyin:"Wǒ bà wǒ mā bù ài huódòng, hái shuō chūqu wánr shì luàn huā qián, tāmen kàn bu guàn.",lesson:"7과",level:3},
{zh:"有时候花点儿钱出去玩儿玩儿，快乐地过个周末也是值得的。",ko:"때로는 돈을 좀 써서 밖에 나가 놀면서 즐겁게 주말을 보내는 것도 가치가 있어요.",pinyin:"Yǒushíhou huā diǎnr qián chūqu wánr wánr, kuàilè de guò ge zhōumò yě shì zhíde de.",lesson:"7과",level:3},
{zh:"老年人和年轻人的想法太不一样了，这就是他们之间的代沟吧？",ko:"노인과 젊은이의 생각이 너무 달라요, 이게 바로 그들 사이의 세대차이겠죠?",pinyin:"Lǎoniánrén hé niánqīngrén de xiǎngfa tài bù yīyàng le, zhè jiù shì tāmen zhījiān de dàigōu ba?",lesson:"7과",level:3},
{zh:"在家里，我爱听我爸爸讲他过去的经历。",ko:"집에서 저는 아빠가 과거의 경험을 이야기해주는 것을 좋아해요.",pinyin:"Zài jiā lǐ, wǒ ài tīng wǒ bàba jiǎng tā guòqù de jīnglì.",lesson:"7과",level:2},
{zh:"妈，您又在洗衣服？我来吧。",ko:"엄마, 또 빨래하세요? 제가 할게요.",pinyin:"Mā, nín yòu zài xǐ yīfu? Wǒ lái ba.",lesson:"7과",level:1},
{zh:"几件衣服，用洗衣机又费电，又费水。",ko:"옷 몇 벌인데 세탁기를 쓰면 전기도 물도 낭비돼요.",pinyin:"Jǐ jiàn yīfu, yòng xǐyījī yòu fèi diàn, yòu fèi shuǐ.",lesson:"7과",level:1},
{zh:"那好吧，我只好听您的，但是千万别把您自己累坏了。",ko:"그래요, 할 수 없이 당신 말을 들을게요, 하지만 제발 너무 지치지 마세요.",pinyin:"Nà hǎo ba, wǒ zhǐhǎo tīng nín de, dànshì qiānwàn bié bǎ nín zìjǐ lèi huài le.",lesson:"7과",level:2},
{zh:"在那儿过春节比在北京热闹多了。",ko:"거기서 설을 쇠는 게 베이징보다 훨씬 시끌벅적해요.",pinyin:"Zài nàr guò Chūnjié bǐ zài Běijīng rènao duō le.",lesson:"7과",level:2},

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let cfg = { types:['write','blank','pinyin'], level:'easy', count:20 };
let queue = [], curIdx = 0, score = 0, wrongItems = [];
let levelMap = { easy:1, mid:2, hard:3 };

/* ═══════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const inExam = id==='questionScreen';
  document.getElementById('hudArea').style.display = inExam?'flex':'none';
}

function toggleType(t,el){
  el.classList.toggle('selected');
  const sel = [...document.querySelectorAll('.type-btn.selected')].map(b=>b.dataset.type);
  cfg.types = sel;
  document.getElementById('startBtn').disabled = sel.length===0;
}
function selectLevel(l,el){
  document.querySelectorAll('.config-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  cfg.level = l;
}
function selectCount(n,el){
  document.querySelectorAll('[data-count]').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  cfg.count = n;
}

/* ═══════════════════════════════════════════════════
   BUILD QUEUE
═══════════════════════════════════════════════════ */
function buildQueue(){
  const lv = levelMap[cfg.level];
  const pool = [];

  if(cfg.types.includes('write')||cfg.types.includes('pinyin')){
    const filtered = ALL.filter(q=>{
      if(cfg.level==='easy') return q.level===1;
      if(cfg.level==='mid') return q.level<=2;
      return true;
    });
    filtered.forEach(q=>{
      if(cfg.types.includes('write')) pool.push({...q, type:'write'});
      if(cfg.types.includes('pinyin')) pool.push({...q, type:'pinyin'});
    });
  }
  if(cfg.types.includes('blank')){
    const filtered = BLANKS.filter(q=>{
      if(cfg.level==='easy') return q.level===1;
      if(cfg.level==='mid') return q.level<=2;
      return true;
    });
    filtered.forEach(q=>pool.push({...q, type:'blank'}));
  }

  // shuffle
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  return pool.slice(0, cfg.count===999?pool.length:cfg.count);
}

/* ═══════════════════════════════════════════════════
   EXAM FLOW
═══════════════════════════════════════════════════ */
function startExam(){
  if(cfg.types.length===0) return;
  queue = buildQueue();
  curIdx = 0; score = 0; wrongItems = [];
  showScreen('questionScreen');
  renderQ();
}

function renderQ(){
  updateHUD();
  const q = queue[curIdx];
  document.getElementById('fb').className='fb';
  document.getElementById('fb').innerHTML='';
  document.getElementById('actionRow').innerHTML='';

  const badge = document.getElementById('qBadge');
  const qCard = document.getElementById('qCard');

  if(q.type==='write'){
    badge.className='q-badge qb-write';
    badge.textContent='유형 1 · 중국어 쓰기';
    qCard.innerHTML=`
      <div class="q-lesson">${q.lesson}</div>
      <div class="q-ko">💬 ${esc(q.ko)}</div>
      <div class="typing-wrap" style="margin-top:14px">
        ${cfg.level==='easy'?`<div class="q-hint">힌트: 총 ${q.zh.length}글자</div>`:''}
        <input class="type-input" id="typeIn" placeholder="중국어로 입력하세요..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      </div>`;
    document.getElementById('typeIn').addEventListener('keydown',e=>{if(e.key==='Enter')checkWrite();});
    document.getElementById('actionRow').innerHTML=`<button class="btn btn-p" onclick="checkWrite()">✅ 확인</button><button class="btn btn-g" onclick="skipQ()">⏭ 건너뛰기</button>`;
    document.getElementById('typeIn').focus();

  } else if(q.type==='pinyin'){
    badge.className='q-badge qb-pinyin';
    badge.textContent='유형 3 · 병음 쓰기';
    qCard.innerHTML=`
      <div class="q-lesson">${q.lesson}</div>
      <div class="q-zh">${esc(q.zh)}</div>
      <div class="q-ko" style="margin-top:6px">💬 ${esc(q.ko)}</div>
      <div class="typing-wrap" style="margin-top:14px">
        <div class="typing-tip">⚠️ <b>대문자·소문자·띄어쓰기</b>까지 정확하게 입력하세요.<br>예) <b>Nǐ hǎo ma?</b> — 문장 첫 글자 대문자, 단어 사이 공백</div>
        <input class="type-input" id="typeIn" placeholder="병음 입력 (예: Nǐ hǎo ma?)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <div class="wordcount" id="wc"></div>
      </div>`;
    const inp=document.getElementById('typeIn');
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkPinyin();});
    inp.addEventListener('input',()=>{
      const w=inp.value.trim().split(/\s+/).filter(Boolean).length;
      const t=q.pinyin.trim().split(/\s+/).length;
      document.getElementById('wc').textContent=w?`입력: ${w}단어 / 목표: ${t}단어`:'';
    });
    document.getElementById('actionRow').innerHTML=`<button class="btn btn-p" onclick="checkPinyin()">✅ 확인</button><button class="btn btn-g" onclick="skipQ()">⏭ 건너뛰기</button>`;
    inp.focus();

  } else {
    badge.className='q-badge qb-blank';
    badge.textContent='유형 2 · 빈칸 채우기';
    // shuffle choices
    const choices=[...q.choices].sort(()=>Math.random()-.5);
    qCard.innerHTML=`
      <div class="q-lesson">${q.lesson}</div>
      <div class="q-blank-sentence">${esc(q.zh)}</div>
      <div class="q-ko">💬 ${esc(q.ko)}</div>
      <div class="choices" style="margin-top:16px">
        ${choices.map(c=>`<button class="choice-btn" onclick="checkBlank('${esc(c)}')">${esc(c)}</button>`).join('')}
      </div>`;
    document.getElementById('actionRow').innerHTML=`<button class="btn btn-g" onclick="skipQ()">⏭ 건너뛰기</button>`;
  }

  document.getElementById('qNum').textContent=`${curIdx+1} / ${queue.length}`;
  document.getElementById('qLesson').textContent=q.lesson;
}

/* ── CHECK FUNCTIONS ── */
function checkWrite(){
  const q=queue[curIdx];
  const val=document.getElementById('typeIn').value.trim();
  if(!val) return;
  const inp=document.getElementById('typeIn');
  const correct=q.zh.replace(/[。，！？、""''…]/g,'');
  const userClean=val.replace(/[。，！？、""''…]/g,'');
  const ok=userClean===correct||val===q.zh;
  inp.classList.add(ok?'ok':'ng');
  showFb(ok, q, val, null, 'write');
  if(!ok) wrongItems.push({q,type:'write',userAns:val});
  else score+=10;
  disableInput();
  showNextBtn();
}

function checkPinyin(){
  const q=queue[curIdx];
  const val=document.getElementById('typeIn').value.trim();
  if(!val) return;
  const inp=document.getElementById('typeIn');
  const correct=q.pinyin.trim();

  // strict mode for 상, flexible for 하/중
  let ok;
  if(cfg.level==='hard'){
    ok = val===correct;
  } else {
    // normalize: ignore trailing punctuation, case-insensitive
    const norm=s=>s.toLowerCase().replace(/[.!?,;]/g,'').replace(/\s+/g,' ').trim();
    ok=norm(val)===norm(correct);
  }

  // diff for feedback
  const diffHtml = buildDiff(val, correct);
  inp.classList.add(ok?'ok':'ng');
  showFb(ok, q, val, diffHtml, 'pinyin');
  if(!ok) wrongItems.push({q,type:'pinyin',userAns:val});
  else score+=10;
  disableInput();
  showNextBtn();
}

function checkBlank(chosen){
  const q=queue[curIdx];
  const ok=chosen===q.answer;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer) b.classList.add('correct');
    else if(b.textContent===chosen&&!ok) b.classList.add('wrong');
  });
  showFb(ok, q, chosen, null, 'blank');
  if(!ok) wrongItems.push({q,type:'blank',userAns:chosen});
  else score+=10;
  showNextBtn();
}

function skipQ(){
  const q=queue[curIdx];
  wrongItems.push({q,type:q.type,userAns:'(건너뜀)'});
  showFb(false, q, '(건너뜀)', null, q.type);
  disableInput();
  showNextBtn();
}

/* ── FEEDBACK ── */
function showFb(ok, q, userAns, diffHtml, type){
  const fb=document.getElementById('fb');
  fb.classList.add('show', ok?'ok':'ng');

  let html='';
  if(ok){
    html=`✅ 정답! (+10점)`;
    if(type==='write') html+=`<div class="ans" style="margin-top:6px">${esc(q.zh)}</div>`;
    if(type==='pinyin') html+=`<div class="pinyin-ans">${esc(q.pinyin)}</div>`;
  } else {
    html=`❌ 오답`;
    if(userAns!=='(건너뜀)') html+=` — 입력: <span style="font-family:var(--mono);font-size:12px">${esc(userAns)}</span>`;
    if(type==='write') html+=`<div class="ans">${esc(q.zh)}</div>`;
    if(type==='pinyin'){
      html+=`<div class="pinyin-ans">정답: ${esc(q.pinyin)}</div>`;
      if(diffHtml) html+=`<div class="diff-line">${diffHtml}</div>`;
    }
    if(type==='blank') html+=`<div class="ans">정답: ${esc(q.answer)}</div>`;
  }
  fb.innerHTML=html;
}

function buildDiff(input, correct){
  const ia=input.trim().split(/\s+/);
  const ca=correct.trim().split(/\s+/);
  const max=Math.max(ia.length,ca.length);
  let out='';
  for(let i=0;i<max;i++){
    const iw=ia[i]||'';const cw=ca[i]||'';
    if(i>0) out+=' ';
    if(!iw) out+=`<span class="diff-mis">${esc(cw)}</span>`;
    else if(iw===cw) out+=`<span class="diff-ok">${esc(cw)}</span>`;
    else out+=`<span class="diff-ng">${esc(iw)}</span>→<span class="diff-ok">${esc(cw)}</span>`;
  }
  return out;
}

function disableInput(){
  const inp=document.getElementById('typeIn');
  if(inp) inp.disabled=true;
}

function showNextBtn(){
  const isLast=curIdx>=queue.length-1;
  document.getElementById('actionRow').innerHTML=
    `<button class="btn btn-ok" onclick="${isLast?'showResult()':'nextQ()'}">${isLast?'결과 보기 →':'▶ 다음 문제'}</button>`;
}

function nextQ(){
  curIdx++;
  if(curIdx>=queue.length){ showResult(); return; }
  renderQ();
}

function updateHUD(){
  document.getElementById('hudQ').textContent=`${curIdx+1}/${queue.length}`;
  document.getElementById('hudScore').textContent=score;
  document.getElementById('progFill').style.width=`${(curIdx/queue.length)*100}%`;
}

/* ═══════════════════════════════════════════════════
   RESULT
═══════════════════════════════════════════════════ */
function showResult(){
  showScreen('resultScreen');
  const total=queue.length*10;
  const pct=Math.round(score/total*100);
  document.getElementById('rScore').textContent=score;
  document.getElementById('rLabel').textContent=`/ ${total}점`;
  document.getElementById('rCorrect').textContent=queue.length-wrongItems.length;
  document.getElementById('rWrong').textContent=wrongItems.length;
  document.getElementById('rAcc').textContent=pct+'%';

  let grade='';
  if(pct>=90) grade='🏆 최우수 — 완벽해요!';
  else if(pct>=80) grade='🥇 우수 — 훌륭해요!';
  else if(pct>=70) grade='🥈 양호 — 잘 하고 있어요!';
  else if(pct>=60) grade='📚 보통 — 더 연습이 필요해요.';
  else grade='💪 분발 — 틀린 문제를 다시 복습해요!';
  document.getElementById('rGrade').textContent=grade;

  const ws=document.getElementById('wrongSection');
  if(wrongItems.length===0){
    ws.innerHTML='<div style="text-align:center;padding:20px;color:var(--green);font-weight:700">🎉 틀린 문제가 없어요! 완벽해요!</div>';
    return;
  }
  let html=`<div class="wrong-title">❌ 틀린 문제 (${wrongItems.length}개) — 답 확인 및 복습</div>`;
  wrongItems.forEach((item,i)=>{
    const {q,type,userAns}=item;
    const typeLabel=type==='write'?'유형1·중국어쓰기':type==='pinyin'?'유형3·병음쓰기':'유형2·빈칸채우기';
    const typeCls=type==='write'?'qb-write':type==='pinyin'?'qb-pinyin':'qb-blank';
    html+=`<div class="wrong-card">
      <span class="wrong-type ${typeCls}">${typeLabel}</span>
      <div class="q-lesson" style="margin-bottom:6px">${q.lesson}</div>`;

    if(type==='write'){
      html+=`<div class="wrong-q">💬 ${esc(q.ko)}</div>
        <div class="wrong-my">내 답: ${esc(userAns)}</div>
        <div class="wrong-ans-zh">정답: ${esc(q.zh)}</div>
        <div class="wrong-ans-py">${esc(q.pinyin)}</div>`;
    } else if(type==='pinyin'){
      html+=`<div class="q-zh" style="font-size:18px;margin-bottom:6px">${esc(q.zh)}</div>
        <div class="wrong-my">내 답: <span style="font-family:var(--mono);font-size:12px">${esc(userAns)}</span></div>
        <div class="wrong-ans-py">정답: ${esc(q.pinyin)}</div>`;
    } else {
      html+=`<div class="wrong-q">${esc(q.zh)}</div>
        <div class="wrong-q">💬 ${esc(q.ko)}</div>
        <div class="wrong-my">내 답: ${esc(userAns)}</div>
        <div class="wrong-ans-zh">정답: ${esc(q.answer)}</div>`;
    }
    html+='</div>';
  });
  ws.innerHTML=html;
}

function retryWrong(){
  if(wrongItems.length===0) return;
  queue=wrongItems.map(item=>({...item.q, type:item.type}));
  curIdx=0;score=0;wrongItems=[];
  showScreen('questionScreen');
  renderQ();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
